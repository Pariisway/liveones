<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - House of Whispers</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-ear-listen"></i>
                House of Whispers - Admin
            </a>
            <button class="btn btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Admin Dashboard</h1>
            <p>Admin: ifanifwasafifth@gmail.com</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Listeners</h3>
                    <div class="stat-amount" id="totalListeners">0</div>
                    <small>Registered listeners</small>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-phone"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Calls</h3>
                    <div class="stat-amount" id="totalCalls">0</div>
                    <small>All time calls</small>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-info">
                    <h3>Platform Revenue</h3>
                    <div class="stat-amount" id="platformRevenue">$0</div>
                    <small>Total earnings</small>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="stat-info">
                    <h3>Unread Messages</h3>
                    <div class="stat-amount" id="unreadMessages">0</div>
                    <small>Contact form</small>
                </div>
            </div>
        </div>

        <div class="quick-actions">
            <h2>Admin Actions</h2>
            <div class="actions-grid">
                <button class="action-btn" onclick="showSection('messages')">
                    <i class="fas fa-envelope"></i>
                    <span>View Messages</span>
                </button>
                <button class="action-btn" onclick="showSection('listeners')">
                    <i class="fas fa-users"></i>
                    <span>Manage Listeners</span>
                </button>
                <button class="action-btn" onclick="showSection('calls')">
                    <i class="fas fa-phone"></i>
                    <span>Call Logs</span>
                </button>
                <button class="action-btn" onclick="showSection('payments')">
                    <i class="fas fa-credit-card"></i>
                    <span>Payment Records</span>
                </button>
            </div>
        </div>

        <div id="messagesSection" class="dashboard-section">
            <h2>Contact Messages</h2>
            <div class="history-container">
                <div id="messagesList">
                    <p style="text-align: center; color: #888; padding: 20px;">No messages yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simple admin authentication
        const adminEmail = "ifanifwasafifth@gmail.com";
        const adminPassword = "040687Pw!";
        
        // Check if admin is logged in
        if (!localStorage.getItem('adminLoggedIn')) {
            const email = prompt("Admin Email:");
            const password = prompt("Admin Password:");
            
            if (email === adminEmail && password === adminPassword) {
                localStorage.setItem('adminLoggedIn', 'true');
            } else {
                alert("Invalid credentials");
                window.location.href = 'index.html';
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadAdminData();
        });
        
        function loadAdminData() {
            // Load messages from localStorage
            const messages = JSON.parse(localStorage.getItem('contactMessages')) || [];
            const messagesList = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                messagesList.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">No messages yet</p>';
            } else {
                messagesList.innerHTML = messages.map((msg, index) => `
                    <div style="border-bottom: 1px solid #333; padding: 15px 0;">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <strong>${msg.name}</strong>
                                <p style="margin: 5px 0; color: #aaa;">${msg.email}</p>
                                <p style="margin: 10px 0;">${msg.message}</p>
                                <p style="color: #888; font-size: 0.9em;">
                                    ${new Date(msg.timestamp).toLocaleString()}
                                </p>
                            </div>
                            <button class="btn btn-danger" onclick="deleteMessage(${index})" style="margin-left: 10px;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('unreadMessages').textContent = messages.length;
            }
            
            // Calculate platform revenue (simplified)
            const allCalls = JSON.parse(localStorage.getItem('allCalls')) || [];
            const revenue = allCalls.length * 3; // $3 per call for platform
            document.getElementById('platformRevenue').textContent = `$${revenue}`;
            document.getElementById('totalCalls').textContent = allCalls.length;
        }
        
        function showSection(section) {
            // Hide all sections except messages for now
            alert(`Section: ${section} - This would show ${section} management in a full implementation.`);
        }
        
        function deleteMessage(index) {
            const messages = JSON.parse(localStorage.getItem('contactMessages')) || [];
            messages.splice(index, 1);
            localStorage.setItem('contactMessages', JSON.stringify(messages));
            loadAdminData();
        }
        
        function logout() {
            localStorage.removeItem('adminLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

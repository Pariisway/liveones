<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Completed - House of Whispers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .button {
            display: inline-block;
            padding: 1rem 2rem;
            background: #8B5CF6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.1rem;
            margin: 0.5rem;
            transition: background 0.3s;
        }
        
        .button:hover {
            background: #7C3AED;
        }
        
        .button.secondary {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .rating-stars {
            margin: 2rem 0;
            font-size: 2rem;
        }
        
        .rating-stars span {
            cursor: pointer;
            margin: 0 5px;
            opacity: 0.7;
            transition: all 0.3s;
        }
        
        .rating-stars span:hover {
            opacity: 1;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">⭐</div>
        <h1>Call Completed!</h1>
        <p>Thank you for your conversation with our whisper.</p>
        
        <div class="rating-stars" id="ratingStars">
            <span onclick="rateCall(1)">☆</span>
            <span onclick="rateCall(2)">☆</span>
            <span onclick="rateCall(3)">☆</span>
            <span onclick="rateCall(4)">☆</span>
            <span onclick="rateCall(5)">☆</span>
        </div>
        
        <p>How was your experience?</p>
        
        <div>
            <a href="shoot-your-shot.html" class="button">Find More Whispers</a>
            <a href="index.html" class="button secondary">Return Home</a>
        </div>
    </div>

    <script>
        function rateCall(rating) {
            const stars = document.getElementById('ratingStars').children;
            
            // Update stars display
            for (let i = 0; i < stars.length; i++) {
                if (i < rating) {
                    stars[i].textContent = '★';
                    stars[i].style.color = '#FBBF24';
                    stars[i].style.opacity = '1';
                } else {
                    stars[i].textContent = '☆';
                    stars[i].style.color = 'white';
                    stars[i].style.opacity = '0.7';
                }
            }
            
            // In production, you'd save this rating to your database
            console.log(`Rated call: ${rating} stars`);
            
            // Show thank you message
            setTimeout(() => {
                alert(`Thank you for your ${rating}-star rating!`);
            }, 300);
        }
    </script>
</body>
</html>

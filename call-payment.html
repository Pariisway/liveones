<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Call - House of Whispers</title>
    <!-- Global Styles -->
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .whisper-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        
        .whisper-avatar {
            font-size: 4rem;
        }
        
        .whisper-info h2 {
            margin-bottom: 10px;
        }
        
        .pricing-card {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .price {
            font-size: 3rem;
            font-weight: bold;
            color: #10B981;
            margin: 10px 0;
        }
        
        .features {
            text-align: left;
            margin: 20px 0;
        }
        
        .features li {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .payment-form {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        .book-call-btn {
            width: 100%;
            padding: 15px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        
        .book-call-btn:hover {
            background: #059669;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">House of Whispers</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="shoot-your-shot.html">Find Whispers</a>
                <a href="become-a-whisper.html">Become a Whisper</a>
                <div class="auth-element logged-out">
                    <a href="login.html" class="btn secondary">Sign In</a>
                </div>
                <div class="auth-element logged-in" style="display: none;">
                    <a href="whisper-portal.html" class="btn primary">My Portal</a>
                    <a href="#" onclick="signOutUser()" class="btn secondary">Sign Out</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🎙️ Book a Voice Call</h1>
            <p>Connect with an amazing whisper for a private 5-minute conversation</p>
        </div>
        
        <div id="loadingMessage" class="loading-message">
            <div class="spinner"></div>
            <p>Loading whisper details...</p>
        </div>
        
        <div id="whisperDetails" style="display: none;">
            <!-- Whisper profile will be loaded here -->
        </div>
        
        <div id="errorMessage" class="error-message" style="display: none;">
            <h3>Whisper Not Found</h3>
            <p>The whisper you're looking for is not available.</p>
            <a href="shoot-your-shot.html" class="btn">Browse Other Whispers</a>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        // Get whisper ID from URL
        function getWhisperIdFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('whisperId');
        }

        // Load whisper details
        async function loadWhisperDetails() {
            const whisperId = getWhisperIdFromUrl();
            
            if (!whisperId) {
                showError('No whisper specified');
                return;
            }

            try {
                console.log('🔍 Loading whisper:', whisperId);
                const doc = await db.collection('whispers').doc(whisperId).get();
                
                if (doc.exists) {
                    const whisper = doc.data();
                    displayWhisperDetails(whisper);
                } else {
                    showError('Whisper not found');
                }
            } catch (error) {
                console.error('Error loading whisper:', error);
                showError('Error loading whisper details');
            }
        }

        function displayWhisperDetails(whisper) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('whisperDetails').style.display = 'block';
            
            document.getElementById('whisperDetails').innerHTML = `
                <div class="whisper-profile">
                    <div class="whisper-avatar">
                        ${whisper.avatar || '👤'}
                    </div>
                    <div class="whisper-info">
                        <h2>${whisper.displayName}</h2>
                        <p><strong>📍 ${whisper.location}</strong></p>
                        <p>${whisper.bio}</p>
                        <p><strong>Interests:</strong> ${whisper.interests}</p>
                        <div style="margin-top: 10px;">
                            <span class="verification-badge">${whisper.verification || 'Verified'}</span>
                            <span class="rating">⭐ ${whisper.rating || '5.0'}</span>
                        </div>
                    </div>
                </div>
                
                <div class="pricing-card">
                    <h2>5-Minute Voice Call</h2>
                    <div class="price">$15</div>
                    <p>Instant connection • Private • Secure</p>
                    
                    <div class="features">
                        <h3>What you get:</h3>
                        <ul>
                            <li>✅ 5-minute private voice call</li>
                            <li>✅ Instant connection after payment</li>
                            <li>✅ Secure, encrypted communication</li>
                            <li>✅ Discuss: ${whisper.interests}</li>
                        </ul>
                    </div>
                    
                    <div class="payment-form">
                        <div class="form-group">
                            <label for="callTopic">What would you like to discuss?</label>
                            <input type="text" id="callTopic" placeholder="e.g., Dating advice, Career questions..." required>
                        </div>
                        
                        <div class="form-group">
                            <label for="userEmail">Your Email</label>
                            <input type="email" id="userEmail" placeholder="Enter your email for confirmation" required>
                        </div>
                        
                        <button class="book-call-btn" onclick="bookCall()">
                            🎙️ Book Call Now - $15
                        </button>
                    </div>
                </div>
                
                <div class="back-link">
                    <a href="shoot-your-shot.html" class="btn secondary">← Back to All Whispers</a>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <h3>${message}</h3>
                <p>Please try another whisper.</p>
                <a href="shoot-your-shot.html" class="btn">Browse Other Whispers</a>
            `;
        }

        async function bookCall() {
            const user = auth.currentUser;
            const whisperId = getWhisperIdFromUrl();
            const callTopic = document.getElementById('callTopic').value;
            const userEmail = document.getElementById('userEmail').value;
            
            if (!callTopic || !userEmail) {
                alert('Please fill in all fields');
                return;
            }

            // For now, we'll simulate payment and create a booking
            // In a real implementation, you'd integrate with Stripe here
            
            try {
                // Create booking in Firestore
                const bookingData = {
                    whisperId: whisperId,
                    customerEmail: userEmail,
                    customerId: user ? user.uid : 'anonymous',
                    topic: callTopic,
                    amount: 15,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    callDate: new Date().toISOString(),
                    duration: 5, // minutes
                    callType: 'voice'
                };
                
                await db.collection('bookings').add(bookingData);
                
                // Redirect to confirmation page
                window.location.href = `booking-confirmation.html?whisperId=${whisperId}&topic=${encodeURIComponent(callTopic)}`;
                
            } catch (error) {
                console.error('Error creating booking:', error);
                alert('Error creating booking. Please try again.');
            }
        }

        // Load whisper details when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadWhisperDetails();
        });

        // Auth state management (optional for this page)
        auth.onAuthStateChanged((user) => {
            const loggedInElements = document.querySelectorAll('.logged-in');
            const loggedOutElements = document.querySelectorAll('.logged-out');
            
            if (user) {
                loggedInElements.forEach(el => el.style.display = 'block');
                loggedOutElements.forEach(el => el.style.display = 'none');
                // Pre-fill email if user is logged in
                if (document.getElementById('userEmail')) {
                    document.getElementById('userEmail').value = user.email;
                }
            } else {
                loggedInElements.forEach(el => el.style.display = 'none');
                loggedOutElements.forEach(el => el.style.display = 'block');
            }
        });

        function signOutUser() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - House of Whispers</title>
    <!-- Global Styles -->
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .call-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .call-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }
        
        .caller-avatar {
            font-size: 3rem;
        }
        
        .caller-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .call-status {
            font-size: 1.2rem;
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(245, 158, 11, 0.2);
            border-left: 4px solid #F59E0B;
        }
        
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .call-btn {
            padding: 15px 25px;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .start-call {
            background: #10B981;
            color: white;
        }
        
        .start-call:hover {
            background: #059669;
            transform: scale(1.1);
        }
        
        .end-call {
            background: #EF4444;
            color: white;
        }
        
        .end-call:hover {
            background: #DC2626;
            transform: scale(1.1);
        }
        
        .mute-call {
            background: #6B7280;
            color: white;
        }
        
        .mute-call:hover {
            background: #4B5563;
            transform: scale(1.1);
        }
        
        .timer {
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }
        
        .call-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .feedback-section {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            display: none;
        }
        
        .rating-stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        
        .star {
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .star:hover {
            color: #FBBF24;
        }
        
        .audio-visualizer {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .visualizer-bar {
            position: absolute;
            bottom: 0;
            width: 4px;
            background: #8B5CF6;
            border-radius: 2px 2px 0 0;
            transition: height 0.1s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ Voice Call</h1>
            <p>Private 5-minute conversation</p>
        </div>
        
        <div class="call-container">
            <div id="callInfo" class="call-info">
                <!-- Call information will be loaded here -->
            </div>
            
            <div id="callStatus" class="call-status">
                🔄 Connecting to call...
            </div>
            
            <div class="timer" id="timer">05:00</div>
            
            <div class="audio-visualizer" id="audioVisualizer">
                <!-- Audio visualizer bars will be generated here -->
            </div>
            
            <div class="call-controls">
                <button id="startCallBtn" class="call-btn start-call" title="Start Call">
                    📞
                </button>
                <button id="muteBtn" class="call-btn mute-call" title="Mute" disabled>
                    🔇
                </button>
                <button id="endCallBtn" class="call-btn end-call" title="End Call" disabled>
                    📴
                </button>
            </div>
            
            <div class="call-stats">
                <div class="stat-card">
                    <div class="stat-number" id="callDuration">0:00</div>
                    <div class="stat-label">Duration</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="callCost">$15.00</div>
                    <div class="stat-label">Cost</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="callEarnings">$12.00</div>
                    <div class="stat-label">Whisper Earnings</div>
                </div>
            </div>
            
            <div id="feedbackSection" class="feedback-section">
                <h3>How was your call?</h3>
                <p>Please rate your experience</p>
                
                <div class="rating-stars">
                    <span class="star" data-rating="1">☆</span>
                    <span class="star" data-rating="2">☆</span>
                    <span class="star" data-rating="3">☆</span>
                    <span class="star" data-rating="4">☆</span>
                    <span class="star" data-rating="5">☆</span>
                </div>
                
                <textarea id="feedbackText" placeholder="Optional feedback about your call..." 
                         style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); margin: 10px 0;"></textarea>
                
                <button id="submitFeedback" class="btn" style="margin-top: 10px;">
                    Submit Feedback
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        // Call state variables
        let callActive = false;
        let callTimer = null;
        let callStartTime = null;
        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;

        // Get call parameters from URL
        function getCallParameters() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                callId: urlParams.get('callId'),
                whisperId: urlParams.get('whisperId'),
                bookingId: urlParams.get('bookingId')
            };
        }

        // Initialize audio visualizer
        function initAudioVisualizer() {
            const visualizer = document.getElementById('audioVisualizer');
            visualizer.innerHTML = '';
            
            // Create 20 bars for the visualizer
            for (let i = 0; i < 20; i++) {
                const bar = document.createElement('div');
                bar.className = 'visualizer-bar';
                bar.style.left = `${i * 6}px`;
                bar.style.height = '0px';
                visualizer.appendChild(bar);
            }
            
            // Simulate audio levels for now
            // In real implementation, this would connect to audio analyser
            setInterval(() => {
                if (callActive) {
                    const bars = document.querySelectorAll('.visualizer-bar');
                    bars.forEach(bar => {
                        const height = Math.random() * 80 + 10;
                        bar.style.height = `${height}px`;
                    });
                }
            }, 100);
        }

        // Load call information
        async function loadCallInfo() {
            const params = getCallParameters();
            
            if (!params.whisperId) {
                document.getElementById('callStatus').textContent = '❌ No whisper specified';
                return;
            }

            try {
                // Load whisper details
                const whisperDoc = await db.collection('whispers').doc(params.whisperId).get();
                
                if (whisperDoc.exists) {
                    const whisper = whisperDoc.data();
                    
                    document.getElementById('callInfo').innerHTML = `
                        <div class="caller-avatar">
                            ${whisper.photoURL ? 
                                `<img src="${whisper.photoURL}" alt="${whisper.displayName}">` :
                                `<span>${whisper.avatar || '👤'}</span>`
                            }
                        </div>
                        <div class="caller-details">
                            <h2>${whisper.displayName}</h2>
                            <p>📍 ${whisper.location}</p>
                            <p>${whisper.interests}</p>
                        </div>
                    `;
                }

                // For now, we'll simulate the call setup
                // In real implementation, this would establish WebRTC connection
                document.getElementById('callStatus').textContent = '✅ Ready to start call';
                document.getElementById('startCallBtn').disabled = false;

            } catch (error) {
                console.error('Error loading call info:', error);
                document.getElementById('callStatus').textContent = '❌ Error loading call details';
            }
        }

        // Start the call
        async function startCall() {
            if (callActive) return;
            
            try {
                // Request microphone access
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: true, 
                    video: false 
                });
                
                callActive = true;
                callStartTime = new Date();
                
                // Update UI
                document.getElementById('callStatus').textContent = '🎙️ Call in progress...';
                document.getElementById('startCallBtn').disabled = true;
                document.getElementById('muteBtn').disabled = false;
                document.getElementById('endCallBtn').disabled = false;
                
                // Start timer
                startCallTimer();
                
                // In real implementation, this is where WebRTC connection would be established
                console.log('🚀 Call started - WebRTC would connect here');
                
            } catch (error) {
                console.error('Error starting call:', error);
                document.getElementById('callStatus').textContent = '❌ Failed to access microphone';
            }
        }

        // Start call timer
        function startCallTimer() {
            let timeLeft = 5 * 60; // 5 minutes in seconds
            const timerElement = document.getElementById('timer');
            const durationElement = document.getElementById('callDuration');
            
            callTimer = setInterval(() => {
                timeLeft--;
                
                if (timeLeft <= 0) {
                    endCall();
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                timerElement.textContent = timeString;
                
                // Update duration for stats
                const elapsed = 5 * 60 - timeLeft;
                const elapsedMinutes = Math.floor(elapsed / 60);
                const elapsedSeconds = elapsed % 60;
                durationElement.textContent = `${elapsedMinutes}:${elapsedSeconds.toString().padStart(2, '0')}`;
                
            }, 1000);
        }

        // End the call
        function endCall() {
            callActive = false;
            
            // Stop timer
            if (callTimer) {
                clearInterval(callTimer);
                callTimer = null;
            }
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Update UI
            document.getElementById('callStatus').textContent = '✅ Call ended';
            document.getElementById('startCallBtn').disabled = true;
            document.getElementById('muteBtn').disabled = true;
            document.getElementById('endCallBtn').disabled = true;
            
            // Show feedback section
            document.getElementById('feedbackSection').style.display = 'block';
            
            // In real implementation, this would close WebRTC connection
            console.log('🛑 Call ended - WebRTC would disconnect here');
            
            // Record call completion (simulated for now)
            recordCallCompletion();
        }

        // Record call completion in Firestore
        async function recordCallCompletion() {
            const params = getCallParameters();
            const user = auth.currentUser;
            
            if (!user || !params.whisperId) return;
            
            try {
                const callData = {
                    whisperId: params.whisperId,
                    customerId: user.uid,
                    duration: 5 * 60, // 5 minutes in seconds
                    amount: 15,
                    whisperEarnings: 12,
                    status: 'completed',
                    endedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    // In real implementation, this would be the actual start time
                    startedAt: callStartTime ? callStartTime.toISOString() : new Date().toISOString()
                };
                
                // Save call record
                await db.collection('calls').add(callData);
                
                // Update whisper's stats
                const whisperRef = db.collection('whispers').doc(params.whisperId);
                await whisperRef.update({
                    totalCalls: firebase.firestore.FieldValue.increment(1),
                    totalEarnings: firebase.firestore.FieldValue.increment(12)
                });
                
                console.log('✅ Call recorded successfully');
                
            } catch (error) {
                console.error('Error recording call:', error);
            }
        }

        // Toggle mute
        function toggleMute() {
            if (!localStream) return;
            
            const audioTracks = localStream.getAudioTracks();
            const isMuted = audioTracks[0].enabled;
            
            audioTracks[0].enabled = !isMuted;
            
            const muteBtn = document.getElementById('muteBtn');
            muteBtn.innerHTML = isMuted ? '🔊' : '🔇';
            muteBtn.title = isMuted ? 'Unmute' : 'Mute';
        }

        // Handle feedback submission
        function setupFeedback() {
            const stars = document.querySelectorAll('.star');
            let selectedRating = 0;
            
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    selectedRating = parseInt(this.getAttribute('data-rating'));
                    
                    // Update stars display
                    stars.forEach((s, index) => {
                        s.textContent = index < selectedRating ? '⭐' : '☆';
                    });
                });
            });
            
            document.getElementById('submitFeedback').addEventListener('click', async function() {
                if (selectedRating === 0) {
                    alert('Please select a rating');
                    return;
                }
                
                const feedbackText = document.getElementById('feedbackText').value;
                const params = getCallParameters();
                
                try {
                    await db.collection('feedback').add({
                        whisperId: params.whisperId,
                        customerId: auth.currentUser.uid,
                        rating: selectedRating,
                        feedback: feedbackText,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    alert('Thank you for your feedback!');
                    window.location.href = 'index.html';
                    
                } catch (error) {
                    console.error('Error submitting feedback:', error);
                    alert('Error submitting feedback');
                }
            });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Check authentication
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    alert('Please sign in to join calls');
                    window.location.href = 'login.html';
                    return;
                }
                
                loadCallInfo();
                initAudioVisualizer();
                setupFeedback();
            });

            // Event listeners
            document.getElementById('startCallBtn').addEventListener('click', startCall);
            document.getElementById('endCallBtn').addEventListener('click', endCall);
            document.getElementById('muteBtn').addEventListener('click', toggleMute);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat Room | House of Whispers</title>
    <meta name="google-adsense-account" content="ca-pub-1184595877548269">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1184595877548269" crossorigin="anonymous"></script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    <script src="js/page-stabilizer.js"></script>
    <script src="js/navigation-guard.js"></script>
    <script src="js/firebase-init-unified.js"></script>
    <script src="js/config.js"></script>
    <style>
        .video-container {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .video-wrapper {
            flex: 1;
            min-width: 280px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .user-display {
            height: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        .user-display i {
            font-size: 64px;
            opacity: 0.5;
        }
        .volume-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }
        .volume-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .call-ended {
            text-align: center;
            padding: 60px 20px;
        }
        .call-ended-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff5555, #cc0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 48px;
        }
    </style>
</head>
<body class="page-transition">
    <header class="header" style="padding: 15px 20px;">
        <nav class="nav-container">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-phone-alt"></i>
                </div>
                <span>Live Call</span>
            </div>
        </nav>
    </header>

    <main style="max-width: 1000px; margin: 20px auto; padding: 20px;">
        <div id="chatRoom" class="glass-card">
            <div style="text-align: center; padding: 40px 20px;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #667eea, #764ba2);
                          border-radius: 50%; display: flex; align-items: center; justify-content: center;
                          margin: 0 auto 30px; font-size: 36px; color: white;">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <h2>Connecting to Private Chat Room...</h2>
                <p style="margin-top: 20px; opacity: 0.7;">Please wait while we establish a secure connection</p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        let callData = null;
        let timerInterval = null;
        let timeLeft = 300; // 5 minutes
        let agoraClient = null;
        let localAudioTrack = null;
        let remoteAudioTrack = null;
        let isMuted = false;
        let callEnded = false;
        
        async function initializeChatRoom() {
            const urlParams = new URLSearchParams(window.location.search);
            const callId = urlParams.get('call');
            const role = urlParams.get('role') || 'customer';
            
            if (!callId) {
                showError('No call specified');
                return;
            }
            
            try {
                const db = firebase.firestore();
                const callDoc = await db.collection('calls').doc(callId).get();
                
                if (!callDoc.exists) {
                    showError('Call not found');
                    return;
                }
                
                callData = callDoc.data();
                const isCustomer = role === 'customer';
                
                // Update call status
                await db.collection('calls').doc(callId).update({
                    status: 'active',
                    [isCustomer ? 'customerJoinedAt' : 'whisperJoinedAt']: new Date()
                });
                
                // Render UI
                renderChatUI(callData, isCustomer);
                
                // Start timer
                startTimer();
                
                // Initialize Agora call
                if (window.APP_CONFIG?.agora?.appId) {
                    initializeAgoraCall(callId, role);
                }
                
                // Listen for call updates
                db.collection('calls').doc(callId)
                    .onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.status === 'ended') {
                                endCall(true);
                            }
                        }
                    });
                
            } catch (error) {
                console.error('Error:', error);
                showError('Error: ' + error.message);
            }
        }
        
        function renderChatUI(call, isCustomer) {
            const container = document.getElementById('chatRoom');
            container.innerHTML = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <h1 style="font-size: 2rem;">Private Voice Chat</h1>
                    <p style="opacity: 0.8;">${isCustomer ? `Talking with ${call.whisperName}` : 'Customer wants to talk'}</p>
                </div>
                
                <div class="timer-display">
                    <div style="opacity: 0.6; margin-bottom: 10px;">Time Remaining</div>
                    <div class="timer">
                        <span id="timerMinutes">05</span>:<span id="timerSeconds">00</span>
                    </div>
                    <div style="opacity: 0.6; margin-top: 10px; font-size: 0.9rem;">
                        5-minute call • ${isCustomer ? 'You paid $15' : 'You earn $12'}
                    </div>
                </div>
                
                <div class="video-container">
                    <div class="video-wrapper">
                        <div class="user-display">
                            <i class="fas fa-user"></i>
                        </div>
                        <div style="font-weight: bold;">${isCustomer ? 'You (Customer)' : 'You (Whisper)'}</div>
                        <div class="volume-controls">
                            <i class="fas fa-volume-up" style="opacity: 0.7;"></i>
                            <input type="range" class="volume-slider" id="localVolume" min="0" max="100" value="100">
                        </div>
                    </div>
                    
                    <div class="video-wrapper">
                        <div class="user-display">
                            <i class="fas fa-user"></i>
                        </div>
                        <div style="font-weight: bold;">${isCustomer ? call.whisperName : 'Customer'}</div>
                        <div class="volume-controls">
                            <i class="fas fa-volume-up" style="opacity: 0.7;"></i>
                            <input type="range" class="volume-slider" id="remoteVolume" min="0" max="100" value="100">
                        </div>
                    </div>
                </div>
                
                <div class="call-controls">
                    <button id="muteButton" class="control-btn" onclick="toggleMute()">
                        <i class="fas fa-microphone"></i> Mute
                    </button>
                    
                    <button class="control-btn" onclick="toggleVolumeControls()">
                        <i class="fas fa-volume-up"></i> Volume
                    </button>
                    
                    ${isCustomer ? `
                        <button class="control-btn end-call-btn" onclick="endCall(false)">
                            <i class="fas fa-phone-slash"></i> End Call
                        </button>
                    ` : ''}
                </div>
                
                <div style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-top: 30px;">
                    <h3 style="margin-bottom: 15px;">Call Information</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; font-size: 0.9rem;">
                        <div><span style="opacity: 0.6;">Status:</span> <span style="color: #00ff00;">Active</span></div>
                        <div><span style="opacity: 0.6;">Started:</span> ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        <div><span style="opacity: 0.6;">${isCustomer ? 'Whisper:' : 'Customer:'}</span> ${isCustomer ? call.whisperName : (call.customerEmail || 'Anonymous')}</div>
                        <div><span style="opacity: 0.6;">Amount:</span> $15.00</div>
                    </div>
                </div>
            `;
        }
        
        async function initializeAgoraCall(callId, role) {
            try {
                const appId = window.APP_CONFIG.agora.appId;
                const channelName = `voice_channel_${callId}`;
                const uid = Math.floor(Math.random() * 100000);
                
                agoraClient = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
                
                await agoraClient.init(appId);
                await agoraClient.join(null, channelName, uid);
                
                // Create and publish local audio
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await agoraClient.publish([localAudioTrack]);
                
                // Subscribe to remote
                agoraClient.on("user-published", async (user, mediaType) => {
                    await agoraClient.subscribe(user, mediaType);
                    if (mediaType === "audio") {
                        remoteAudioTrack = user.audioTrack;
                        remoteAudioTrack.play();
                    }
                });
                
                agoraClient.on("user-left", () => {
                    endCall(true);
                });
                
                console.log('Agora call connected');
                
            } catch (error) {
                console.error('Agora error:', error);
            }
        }
        
        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) endCall(true);
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerMinutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('timerSeconds').textContent = seconds.toString().padStart(2, '0');
            
            if (timeLeft < 60) {
                document.querySelector('.timer').style.background = 'linear-gradient(45deg, #ff416c, #ff4b2b)';
                document.querySelector('.timer').style.WebkitBackgroundClip = 'text';
                document.querySelector('.timer').style.backgroundClip = 'text';
            }
        }
        
        function toggleMute() {
            if (!localAudioTrack) return;
            isMuted = !isMuted;
            localAudioTrack.setEnabled(!isMuted);
            
            const button = document.getElementById('muteButton');
            if (isMuted) {
                button.innerHTML = '<i class="fas fa-microphone-slash"></i> Unmute';
                button.style.background = 'var(--danger)';
            } else {
                button.innerHTML = '<i class="fas fa-microphone"></i> Mute';
                button.style.background = '';
            }
        }
        
        function toggleVolumeControls() {
            const controls = document.querySelectorAll('.volume-controls');
            controls.forEach(c => c.style.display = c.style.display === 'none' ? 'flex' : 'flex');
        }
        
        async function endCall(isAutoEnd = false) {
            if (callEnded) return;
            callEnded = true;
            
            clearInterval(timerInterval);
            
            if (callData) {
                const db = firebase.firestore();
                await db.collection('calls').doc(callData.callId).update({
                    status: 'completed',
                    endedAt: new Date(),
                    endReason: isAutoEnd ? 'time_expired' : 'user_ended',
                    actualDuration: 300 - timeLeft
                });
                
                // Add earnings if call completed
                if (isAutoEnd && callData.whisperId) {
                    await db.collection('users').doc(callData.whisperId).update({
                        totalEarnings: firebase.firestore.FieldValue.increment(12),
                        totalCalls: firebase.firestore.FieldValue.increment(1)
                    });
                }
            }
            
            // Clean up Agora
            if (agoraClient) {
                if (localAudioTrack) localAudioTrack.close();
                await agoraClient.leave();
            }
            
            showCallEndedScreen(isAutoEnd);
        }
        
        function showCallEndedScreen(isAutoEnd) {
            const container = document.getElementById('chatRoom');
            container.innerHTML = `
                <div class="call-ended">
                    <div class="call-ended-icon">
                        <i class="fas fa-phone-slash"></i>
                    </div>
                    <h2>Call Ended</h2>
                    <p style="margin: 20px 0; font-size: 1.1rem;">
                        ${isAutoEnd ? 'The 5-minute call has completed.' : 'You ended the call.'}
                    </p>
                    
                    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 30px;">
                        <a href="index.html" class="call-btn">
                            <i class="fas fa-home"></i> Back to Home
                        </a>
                    </div>
                </div>
            `;
        }
        
        function showError(message) {
            const container = document.getElementById('chatRoom');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <div style="color: #ff5555; font-size: 64px; margin-bottom: 20px;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h2>Error</h2>
                    <p style="margin: 20px 0;">${message}</p>
                    <a href="index.html" class="call-btn">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                </div>
            `;
        }
        
        // Initialize
        if (typeof pageStabilizer !== 'undefined') {
            pageStabilizer.waitForStable(initializeChatRoom);
        } else {
            document.addEventListener('DOMContentLoaded', initializeChatRoom);
        }
    </script>
</body>
</html>

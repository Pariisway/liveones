<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dater Dashboard - House of Whispers</title>
    <style>
        .delete-profile-btn {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
        .delete-profile-btn:hover {
            background: linear-gradient(145deg, #cc0000, #990000);
        }
    </style>
</head>
<body>
    <!-- Your existing dashboard content -->
    
    <div class="dashboard-section">
        <h3>Account Management</h3>
        <button class="delete-profile-btn" onclick="deleteMyProfile()">
            🗑️ Delete My Profile
        </button>
        <p style="color: #666; font-size: 14px; margin-top: 10px;">
            This will permanently remove your profile and all associated data.
        </p>
    </div>

    <script>
        async function deleteMyProfile() {
            try {
                // Get current dater ID from localStorage or URL
                const currentDater = JSON.parse(localStorage.getItem('currentDater') || '{}');
                const daterId = currentDater.id || getDaterIdFromURL();
                
                if (!daterId) {
                    alert('Could not find your profile ID. Please contact support.');
                    return;
                }

                if (window.platformManager && window.platformManager.deleteDaterProfile) {
                    await window.platformManager.deleteDaterProfile(daterId);
                } else {
                    alert('Platform manager not available. Please refresh the page and try again.');
                }
            } catch (error) {
                console.error('Error deleting profile:', error);
                alert('Failed to delete profile: ' + error.message);
            }
        }

        function getDaterIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('daterId');
        }
    </script>
</body>
</html>

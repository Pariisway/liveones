<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <title>Dater Signup - House of Whispers</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dating.css">
    <style>
        .signup-form {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .form-section {
            background: rgba(255, 0, 51, 0.1);
            border: 1px solid var(--accent1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .form-section-title {
            color: var(--accent1);
            font-size: 18px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent1);
            padding-bottom: 5px;
        }
        
        .schedule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-bottom: 5px;
        }
        
        .remove-schedule {
            background: var(--accent1);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-left: auto;
        }
        
        .schedule-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            align-items: end;
        }
    </style>
</head>
<body class="fonts-loading">
    <div class="cyber-background"></div>
    <div class="grid-overlay"></div>
    
    <header class="site-header">
        <div class="glowing-title title-large">DATER SIGNUP</div>
        <div class="glowing-title title-medium">💖 CREATE YOUR PROFILE</div>
    </header>

    <main class="main-wrap">
        <div class="panel">
            <form id="daterSignupForm" class="signup-form">
                <div class="form-section">
                    <div class="form-section-title">👤 Basic Information</div>
                    
                    <div class="form-group">
                        <label class="form-label">Username *</label>
                        <input type="text" class="form-control" id="daterUsername" required placeholder="Choose a unique username">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Display Name *</label>
                        <input type="text" class="form-control" id="daterDisplayName" required placeholder="e.g., Sarah, 24">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="daterEmail" required placeholder="your@email.com">
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">📍 Profile Details</div>
                    
                    <div class="form-group">
                        <label class="form-label">Location *</label>
                        <input type="text" class="form-control" id="daterLocation" required placeholder="e.g., Los Angeles, CA">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Avatar Emoji *</label>
                        <input type="text" class="form-control" id="daterAvatar" required placeholder="e.g., 🔥, 💫, 🌟">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Bio *</label>
                        <textarea class="form-control" id="daterBio" rows="4" required placeholder="Tell people about yourself..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Interests</label>
                        <input type="text" class="form-control" id="daterInterests" placeholder="e.g., Hiking, Coffee, Travel, Music">
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">🕐 Availability</div>
                    
                    <div class="form-group">
                        <label class="form-label">Timezone *</label>
                        <select class="form-control" id="daterTimezone" required>
                            <option value="">Select your timezone</option>
                            <option value="PST">PST - Pacific Time</option>
                            <option value="EST">EST - Eastern Time</option>
                            <option value="CST">CST - Central Time</option>
                            <option value="MST">MST - Mountain Time</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Chat Schedule *</label>
                        <div class="schedule-inputs">
                            <div>
                                <label style="color: var(--muted); font-size: 12px;">Start Time (24h)</label>
                                <input type="time" class="form-control" id="scheduleStart">
                            </div>
                            <div>
                                <label style="color: var(--muted); font-size: 12px;">End Time (24h)</label>
                                <input type="time" class="form-control" id="scheduleEnd">
                            </div>
                            <button type="button" class="add-schedule-btn" id="addScheduleBtn" style="background: var(--accent2); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">+ Add Time Slot</button>
                        </div>
                        <div style="color: var(--muted); font-size: 12px; margin-top: 5px;">
                            Add at least one time slot when you're available for chats
                        </div>
                        <div class="schedule-list" id="scheduleList" style="margin-top: 10px;"></div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="form-section-title">💰 Payment Terms</div>
                    <div style="background: rgba(0, 255, 153, 0.1); padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                        <div style="text-align: center;">
                            <div style="font-size: 18px; color: var(--accent2); margin-bottom: 10px;">Earnings Breakdown</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div>
                                    <div style="font-size: 14px; color: var(--muted);">Chat Price</div>
                                    <div style="color: var(--accent2);">$15.00</div>
                                </div>
                                <div>
                                    <div style="font-size: 14px; color: var(--muted);">Platform Fee</div>
                                    <div style="color: var(--accent1);">$3.75 (25%)</div>
                                </div>
                                <div>
                                    <div style="font-size: 14px; color: var(--muted);">Your Earnings</div>
                                    <div style="color: var(--accent3);">$11.25 (75%)</div>
                                </div>
                                <div>
                                    <div style="font-size: 14px; color: var(--muted);">Payout</div>
                                    <div style="color: gold;">Weekly</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="display: flex; align-items: start; gap: 10px; margin-bottom: 15px;">
                        <input type="checkbox" id="agreeTerms" required style="margin-top: 3px;">
                        <label for="agreeTerms" style="color: var(--text); font-size: 14px;">
                            I agree to the <a href="#" style="color: var(--accent2);">Terms of Service</a> and understand I'll receive 75% ($11.25) of each $15 chat session.
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn primary" style="width: 100%; font-size: 18px; padding: 20px;">
                    🚀 CREATE DATER PROFILE
                </button>
            </form>
        </div>

        <a href="become-a-dater.html" class="back-btn">← Back</a>
    </main>

    <script src="js/platform-manager.js"></script>
    <script>
        let schedules = [];

        // Add schedule
        document.getElementById('addScheduleBtn').addEventListener('click', function() {
            const start = document.getElementById('scheduleStart').value;
            const end = document.getElementById('scheduleEnd').value;
            
            if (start && end) {
                const scheduleString = `${start}-${end}`;
                if (!schedules.includes(scheduleString)) {
                    schedules.push(scheduleString);
                    updateScheduleList();
                    
                    // Clear inputs
                    document.getElementById('scheduleStart').value = '';
                    document.getElementById('scheduleEnd').value = '';
                } else {
                    alert('This time slot is already added');
                }
            } else {
                alert('Please select both start and end times');
            }
        });

        function updateScheduleList() {
            const list = document.getElementById('scheduleList');
            list.innerHTML = '';
            
            if (schedules.length === 0) {
                list.innerHTML = '<div style="color: var(--muted); text-align: center; padding: 10px;">No schedule slots added yet</div>';
                return;
            }
            
            schedules.forEach((schedule, index) => {
                const item = document.createElement('div');
                item.className = 'schedule-item';
                item.innerHTML = `
                    <span>${schedule}</span>
                    <button type="button" class="remove-schedule" onclick="removeSchedule(${index})">×</button>
                `;
                list.appendChild(item);
            });
        }

        function removeSchedule(index) {
            schedules.splice(index, 1);
            updateScheduleList();
        }

        // Form submission - FIXED VERSION
        document.getElementById('daterSignupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            console.log('Form submission started...');
            
            // Validate required fields
            const requiredFields = [
                'daterUsername', 'daterDisplayName', 'daterEmail', 
                'daterLocation', 'daterAvatar', 'daterBio', 'daterTimezone'
            ];
            
            for (let field of requiredFields) {
                const element = document.getElementById(field);
                if (!element.value.trim()) {
                    const fieldName = element.previousElementSibling.textContent.replace('*', '').trim();
                    alert(`Please fill in the ${fieldName} field`);
                    element.focus();
                    return;
                }
            }

            // Validate schedule - FIXED: Only require at least one schedule
            if (schedules.length === 0) {
                alert('Please add at least one schedule slot when you are available for chats');
                return;
            }

            const daterData = {
                username: document.getElementById('daterUsername').value.trim(),
                displayName: document.getElementById('daterDisplayName').value.trim(),
                email: document.getElementById('daterEmail').value.trim(),
                location: document.getElementById('daterLocation').value.trim(),
                avatar: document.getElementById('daterAvatar').value.trim(),
                bio: document.getElementById('daterBio').value.trim(),
                interests: document.getElementById('daterInterests').value.split(',').map(i => i.trim()).filter(i => i),
                timezone: document.getElementById('daterTimezone').value,
                schedule: [...schedules],
                verification: 'Pending Verification'
            };
            
            console.log('Dater data prepared:', daterData);
            
            // Check if platformManager exists
            if (typeof platformManager === 'undefined') {
                console.error('platformManager is not defined!');
                alert('Error: Platform system not loaded. Please refresh the page.');
                return;
            }
            
            try {
                console.log('Attempting to add dater to platform manager...');
                platformManager.addDater(daterData);
                console.log('Dater added successfully!');
                
                alert('🎉 Dater profile created successfully! You can now receive paid chat requests.');
                setTimeout(() => {
                    window.location.href = 'shoot-your-shot.html';
                }, 1000);
                
            } catch (error) {
                console.error('Error adding dater:', error);
                if (error.message.includes('already exists')) {
                    alert('Username already exists. Please choose a different username.');
                    document.getElementById('daterUsername').focus();
                    document.getElementById('daterUsername').select();
                } else {
                    alert('Error creating profile: ' + error.message);
                }
            }
        });

        // Debug function
        window.debugPlatform = function() {
            console.log('=== DEBUG PLATFORM MANAGER ===');
            console.log('Platform Manager:', window.platformManager);
            if (window.platformManager) {
                const daters = platformManager.getAllDaters();
                console.log('Total Daters:', daters.length);
                console.log('Daters:', daters);
                alert(`Found ${daters.length} daters in system. Check console for details.`);
            }
        };

        // Initialize schedule list
        updateScheduleList();

        // Font loading
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(() => {
                document.body.classList.remove('fonts-loading');
                document.body.classList.add('fonts-loaded');
            });
        }
    </script>
</body>
</html>

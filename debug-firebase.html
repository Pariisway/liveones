<!DOCTYPE html>
<html>
<head>
    <title>Debug Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-init-unified.js"></script>
</head>
<body>
    <h1>Firebase Debug</h1>
    <button onclick="testFirebase()">Test Firebase Connection</button>
    <button onclick="createTestWhisper()">Create Test Whisper</button>
    <div id="output" style="margin-top: 20px; padding: 20px; background: #f0f0f0;"></div>
    
    <script>
        async function testFirebase() {
            const output = document.getElementById('output');
            output.innerHTML = '<p>Testing Firebase connection...</p>';
            
            try {
                // Initialize Firebase
                if (typeof firebaseUtils !== 'undefined') {
                    await firebaseUtils.initialize();
                }
                
                const db = firebase.firestore();
                
                // Test read
                const users = await db.collection('users').get();
                output.innerHTML += `<p>✅ Firebase connected! Found ${users.size} users</p>`;
                
                // List all users
                users.forEach(doc => {
                    const data = doc.data();
                    output.innerHTML += `
                        <p>User: ${data.email} (Type: ${data.userType || 'unknown'}) - Available: ${data.isAvailable || false}</p>
                    `;
                });
                
            } catch (error) {
                output.innerHTML += `<p style="color: red;">❌ Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        async function createTestWhisper() {
            const output = document.getElementById('output');
            
            try {
                const db = firebase.firestore();
                const testId = 'test_whisper_' + Date.now();
                
                await db.collection('users').doc(testId).set({
                    email: 'test@example.com',
                    username: 'Test Whisper',
                    userType: 'whisper',
                    isAvailable: true,
                    bio: 'I am a test whisper for debugging',
                    profilePic: 'https://ui-avatars.com/api/?name=Test+Whisper&background=7c3aed&color=fff',
                    totalEarnings: 0,
                    totalCalls: 0,
                    rating: 5.0,
                    createdAt: new Date()
                });
                
                output.innerHTML += `<p style="color: green;">✅ Created test whisper!</p>`;
                output.innerHTML += `<p>Refresh the main page to see this whisper.</p>`;
                
            } catch (error) {
                output.innerHTML += `<p style="color: red;">❌ Error creating whisper: ${error.message}</p>`;
            }
        }
        
        // Auto-test on load
        setTimeout(testFirebase, 1000);
    </script>
</body>
</html>

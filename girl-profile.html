<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Profile - House of Whispers</title>
    <link rel="stylesheet" href="https://iaiwaf.com/css/style.css">
    <link rel="stylesheet" href="https://iaiwaf.com/css/dating.css">
</head>
<body class="fonts-loading">
    <div class="cyber-background"></div>
    <div class="main-wrap">
        <header class="site-header">
            <div class="glowing-title title-large">WHISPER PROFILE</div>
        </header>

        <div class="panel">
            <div id="loadingMessage">Loading whisper profile...</div>
            
            <div id="profileContent" style="display: none;">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <span id="profileAvatar" style="font-size: 80px;">👤</span>
                    </div>
                    <h1 id="profileName" class="glowing-title title-medium"></h1>
                    <p id="profileLocation" class="profile-location"></p>
                </div>

                <div class="profile-bio">
                    <h3>About Me</h3>
                    <p id="profileBio"></p>
                </div>

                <div class="profile-stats">
                    <div class="stat">
                        <div class="stat-number" id="profileRating">0.0</div>
                        <div class="stat-label">Rating</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="profileChats">0</div>
                        <div class="stat-label">Chats</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="profileResponse">2m</div>
                        <div class="stat-label">Response</div>
                    </div>
                </div>

                <div style="text-align: center; margin: 30px 0;">
                    <button class="btn primary" onclick="startChat()" style="font-size: 20px; padding: 15px 30px;">
                        💘 Start Chat - $15
                    </button>
                    <div style="margin-top: 15px; text-align: center;">
                        <a href="whisper-dashboard.html" id="dashboardLink" class="btn" style="background: var(--accent2);">
                            📊 Whisper Dashboard
                        </a>
                    </div>
                </div>

                <div class="profile-interests">
                    <h3>Interests</h3>
                    <div id="profileInterests"></div>
                </div>
            </div>

            <div id="errorMessage" style="display: none; text-align: center;">
                <h3>Profile Not Found</h3>
                <p>This whisper profile doesn't exist or may have been deleted.</p>
                <a href="shoot-your-shot.html" class="btn primary">Browse Whispers</a>
            </div>
        </div>
    </div>

    <script src="js/platform-manager.js"></script>
    <script>
        let currentGirl = null;

        async function loadProfile() {
            console.log('🚀 Starting whisper profile page...');
            
            // Get girl ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const girlId = urlParams.get('girl');
            
            if (!girlId) {
                showError('No whisper profile specified.');
                return;
            }

            console.log('🔍 Starting profile load...');
            
            try {
                // Wait for platform manager
                await waitForPlatformManager();
                
                console.log('📡 Fetching whispers from platform...');
                const daters = await window.platformManager.getAllDaters();
                console.log('📊 Found whispers:', daters);
                
                currentGirl = daters.find(dater => dater.id === girlId);
                console.log('🎯 Looking for whisper ID:', girlId);
                console.log('🔎 Found whisper:', currentGirl);
                
                if (!currentGirl) {
                    showError('Whisper profile not found.');
                    return;
                }

                displayProfile(currentGirl);
                
            } catch (error) {
                console.error('❌ Error loading profile:', error);
                showError('Failed to load profile: ' + error.message);
            }
        }

        function waitForPlatformManager() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 20;
                
                function check() {
                    attempts++;
                    if (window.platformManager && window.platformManager.initialized) {
                        resolve();
                    } else if (attempts < maxAttempts) {
                        setTimeout(check, 500);
                    } else {
                        reject(new Error('Platform manager failed to initialize'));
                    }
                }
                
                check();
            });
        }

        function displayProfile(girl) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('profileContent').style.display = 'block';
            
            // Update profile info
            document.getElementById('profileAvatar').textContent = girl.avatar || '👤';
            document.getElementById('profileName').textContent = girl.displayName || girl.username;
            document.getElementById('profileLocation').textContent = `📍 ${girl.location || 'Location not set'}`;
            document.getElementById('profileBio').textContent = girl.bio || 'No bio yet.';
            
            // Update stats
            document.getElementById('profileRating').textContent = girl.rating ? girl.rating.toFixed(1) : '0.0';
            document.getElementById('profileChats').textContent = girl.totalChats || 0;
            document.getElementById('profileResponse').textContent = girl.responseTime || '2m';
            
            // Update interests
            const interestsDiv = document.getElementById('profileInterests');
            if (girl.interests && girl.interests.length > 0) {
                interestsDiv.innerHTML = girl.interests.map(interest => 
                    `<span class="interest-tag">${interest}</span>`
                ).join('');
            } else {
                interestsDiv.innerHTML = '<p>No interests specified yet.</p>';
            }
            
            // Update dashboard link
            document.getElementById('dashboardLink').href = `whisper-dashboard.html?whisperId=${girl.id}`;
            
            console.log('🎨 Displaying profile:', girl);
            console.log('✅ Profile displayed successfully');
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <h3>Profile Not Found</h3>
                <p>${message}</p>
                <a href="shoot-your-shot.html" class="btn primary">Browse Whispers</a>
            `;
        }

        function startChat() {
            if (!currentGirl) {
                alert('Please wait for the profile to load.');
                return;
            }
            
            // For now, just show a message
            alert(`Starting chat with ${currentGirl.displayName} would cost $15. This feature is coming soon!`);
            
            // In the future, this would:
            // 1. Process payment
            // 2. Create a chat session
            // 3. Redirect to private chat page
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>

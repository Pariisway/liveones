<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girl Profile - House of Whispers</title>
    <style>
        /* Copy the same CSS from shoot-your-shot.html */
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent1: #ff0033;
            --accent2: #00ff99;
            --accent3: #ffcc00;
            --text: #ffffff;
            --muted: #888888;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .site-header {
            text-align: center;
            padding: 25px 20px;
            border-bottom: 3px solid var(--accent1);
            background: rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }
        
        .glowing-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-align: center;
        }
        
        .title-large {
            font-size: 48px;
            color: var(--accent1);
            text-shadow: 0 0 30px var(--accent1);
            margin-bottom: 10px;
        }
        
        .title-medium {
            font-size: 24px;
            color: var(--accent2);
            text-shadow: 0 0 20px var(--accent2);
        }
        
        .profile-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 3px solid var(--accent1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .girl-avatar {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .girl-name {
            color: var(--accent2);
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .girl-location {
            color: var(--muted);
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .info-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            color: var(--accent3);
            font-size: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent3);
            padding-bottom: 5px;
        }
        
        .bio-text {
            line-height: 1.6;
            font-size: 16px;
        }
        
        .schedule-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .time-slot {
            background: rgba(255, 0, 51, 0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--accent1);
        }
        
        .time-slot.active {
            background: rgba(0, 255, 153, 0.2);
            border-color: var(--accent2);
        }
        
        .purchase-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--accent1);
        }
        
        .price-tag {
            font-size: 24px;
            color: gold;
            margin-bottom: 15px;
        }
        
        .purchase-btn {
            background: linear-gradient(145deg, var(--accent1), #ff3366);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        
        .purchase-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }
        
        .queue-info {
            margin-top: 15px;
            color: var(--muted);
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            background: linear-gradient(145deg, var(--accent2), #00cc88);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }

        /* Image upload styles */
        .avatar-upload {
            text-align: center;
            margin: 20px 0;
        }
        
        .avatar-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent2);
            margin-bottom: 10px;
        }
        
        .upload-btn {
            background: var(--accent3);
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .upload-input {
            display: none;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="glowing-title title-large">SHOOT YOUR SHOT</div>
        <div class="glowing-title title-medium" id="pageTitle">MEET THE GIRL</div>
    </header>

    <div class="profile-container">
        <div class="profile-header">
            <!-- Avatar Section with Image Upload Option -->
            <div class="avatar-upload">
                <img id="girlImage" class="avatar-image" src="" alt="Profile" style="display: none;">
                <div class="girl-avatar" id="girlAvatar">🔥</div>
                <input type="file" id="imageUpload" class="upload-input" accept="image/*">
                <button class="upload-btn" onclick="document.getElementById('imageUpload').click()">
                    📷 Upload Photo
                </button>
            </div>
            
            <div class="girl-name" id="girlName">Loading...</div>
            <div class="girl-location" id="girlLocation">📍 Loading...</div>
        </div>

        <div class="info-section">
            <div class="section-title">About Me</div>
            <div class="bio-text" id="girlBio">Loading profile...</div>
        </div>

        <div class="info-section">
            <div class="section-title">Chat Schedule</div>
            <div class="schedule-slots" id="scheduleSlots">
                <!-- Schedule slots will be loaded dynamically -->
            </div>
        </div>

        <div class="info-section">
            <div class="section-title">Verification</div>
            <div class="bio-text" id="girlVerification">✅ Verified Member</div>
        </div>

        <div class="purchase-section">
            <div class="price-tag">$15 for 5-Minute Private Chat</div>
            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseChat()" disabled>
                Purchase Private Chat
            </button>
            <div class="queue-info" id="queueInfo">
                Purchase available only during scheduled hours
            </div>
        </div>
    </div>

    <a href="shoot-your-shot.html" class="back-btn">← Back to Girls</a>

    <!-- Load Platform Manager First -->
    <script src="js/platform-manager.js"></script>
    
    <script>
        // Load girl profile from platform manager
        async function loadGirlProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const girlId = urlParams.get('girl');
            
            console.log('🔄 Loading girl profile for:', girlId);
            
            if (!girlId) {
                console.error('❌ No girl ID provided');
                window.location.href = 'shoot-your-shot.html';
                return;
            }
            
            try {
                // Wait for platform manager to be ready
                if (typeof platformManager === 'undefined') {
                    console.error('❌ Platform manager not available');
                    setTimeout(loadGirlProfile, 500);
                    return;
                }

                const daters = await platformManager.getAllDaters();
                console.log('📊 Available daters:', daters);
                
                const girl = daters.find(d => d.id === girlId);
                console.log('🎯 Found girl:', girl);
                
                if (!girl) {
                    console.error('❌ Girl not found with ID:', girlId);
                    alert('Profile not found. This dater may no longer be available.');
                    window.location.href = 'shoot-your-shot.html';
                    return;
                }

                // Update page with girl info
                document.getElementById('pageTitle').textContent = `MEET ${girl.displayName.split(',')[0].toUpperCase()}`;
                document.getElementById('girlAvatar').textContent = girl.avatar || '👤';
                document.getElementById('girlName').textContent = girl.displayName;
                document.getElementById('girlLocation').textContent = `📍 ${girl.location}`;
                document.getElementById('girlBio').textContent = girl.bio || 'No bio provided';

                // Update verification badge
                const verificationElement = document.getElementById('girlVerification');
                if (verificationElement) {
                    verificationElement.textContent = girl.verification || '✅ Verified Member';
                }

                // Create schedule slots
                const scheduleContainer = document.getElementById('scheduleSlots');
                scheduleContainer.innerHTML = '';
                
                if (girl.schedule && girl.schedule.length > 0) {
                    girl.schedule.forEach(slot => {
                        const slotDiv = document.createElement('div');
                        slotDiv.className = 'time-slot';
                        slotDiv.textContent = slot;
                        scheduleContainer.appendChild(slotDiv);
                    });
                } else {
                    scheduleContainer.innerHTML = '<div style="color: var(--muted);">Schedule not set</div>';
                }

                // Check if it's currently scheduled time
                checkSchedule(girl);
                
                // Check schedule every minute
                setInterval(() => checkSchedule(girl), 60000);
                
                console.log('✅ Girl profile loaded successfully');
                
            } catch (error) {
                console.error('❌ Error loading girl profile:', error);
                alert('Error loading profile. Please try again.');
                window.location.href = 'shoot-your-shot.html';
            }
        }

        // Check schedule function
        function checkSchedule(girl) {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ':' + 
                              now.getMinutes().toString().padStart(2, '0');
            
            let isActive = false;
            
            if (girl.schedule && girl.schedule.length > 0) {
                girl.schedule.forEach(slot => {
                    const [start, end] = slot.split('-');
                    if (currentTime >= start && currentTime <= end) {
                        isActive = true;
                    }
                });
            }

            const purchaseBtn = document.getElementById('purchaseBtn');
            const queueInfo = document.getElementById('queueInfo');
            
            if (isActive) {
                purchaseBtn.disabled = false;
                queueInfo.textContent = 'Chat is LIVE! Join the queue now.';
                // Add active class to current time slot
                document.querySelectorAll('.time-slot').forEach(slot => {
                    if (slot.textContent.includes(currentTime.substring(0,2))) {
                        slot.classList.add('active');
                    }
                });
            } else {
                purchaseBtn.disabled = true;
                queueInfo.textContent = 'Purchase available only during scheduled hours';
            }
        }

        // Purchase function
        function purchaseChat() {
            const urlParams = new URLSearchParams(window.location.search);
            const girlId = urlParams.get('girl');
            
            if (!girlId) {
                alert('Error: No dater selected');
                return;
            }
            
            console.log('💰 Redirecting to payment for girl:', girlId);
            window.location.href = `payments.html?girl=${girlId}`;
        }

        // Image upload functionality
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageUrl = e.target.result;
                    document.getElementById('girlImage').src = imageUrl;
                    document.getElementById('girlImage').style.display = 'block';
                    document.getElementById('girlAvatar').style.display = 'none';
                    
                    // Save to localStorage for this session
                    const urlParams = new URLSearchParams(window.location.search);
                    const girlId = urlParams.get('girl');
                    localStorage.setItem(`avatar_${girlId}`, imageUrl);
                };
                reader.readAsDataURL(file);
            }
        });

        // Load saved image on page load
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const girlId = urlParams.get('girl');
            const savedImage = localStorage.getItem(`avatar_${girlId}`);
            if (savedImage) {
                document.getElementById('girlImage').src = savedImage;
                document.getElementById('girlImage').style.display = 'block';
                document.getElementById('girlAvatar').style.display = 'none';
            }
        });

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🏠 DOM loaded, initializing girl profile...');
            loadGirlProfile();
        });
    </script>
</body>
</html>

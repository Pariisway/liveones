<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girl Profile - House of Whispers</title>
    <style>
        /* Copy the same CSS from shoot-your-shot.html */
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent1: #ff0033;
            --accent2: #00ff99;
            --accent3: #ffcc00;
            --text: #ffffff;
            --muted: #888888;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .site-header {
            text-align: center;
            padding: 25px 20px;
            border-bottom: 3px solid var(--accent1);
            background: rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }
        
        .glowing-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-align: center;
        }
        
        .title-large {
            font-size: 48px;
            color: var(--accent1);
            text-shadow: 0 0 30px var(--accent1);
            margin-bottom: 10px;
        }
        
        .profile-container {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 3px solid var(--accent1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .girl-avatar {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .girl-name {
            color: var(--accent2);
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .girl-location {
            color: var(--muted);
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .info-section {
            margin-bottom: 25px;
        }
        
        .section-title {
            color: var(--accent3);
            font-size: 20px;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--accent3);
            padding-bottom: 5px;
        }
        
        .bio-text {
            line-height: 1.6;
            font-size: 16px;
        }
        
        .schedule-slots {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .time-slot {
            background: rgba(255, 0, 51, 0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--accent1);
        }
        
        .time-slot.active {
            background: rgba(0, 255, 153, 0.2);
            border-color: var(--accent2);
        }
        
        .purchase-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid var(--accent1);
        }
        
        .price-tag {
            font-size: 24px;
            color: gold;
            margin-bottom: 15px;
        }
        
        .purchase-btn {
            background: linear-gradient(145deg, var(--accent1), #ff3366);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        
        .purchase-btn:disabled {
            background: var(--muted);
            cursor: not-allowed;
        }
        
        .queue-info {
            margin-top: 15px;
            color: var(--muted);
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            background: linear-gradient(145deg, var(--accent2), #00cc88);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="glowing-title title-large">SHOOT YOUR SHOT</div>
        <div class="glowing-title title-medium" id="pageTitle">MEET THE GIRL</div>
    </header>

    <div class="profile-container">
        <div class="profile-header">
            <div class="girl-avatar" id="girlAvatar">🔥</div>
            <div class="girl-name" id="girlName">Loading...</div>
            <div class="girl-location" id="girlLocation">📍 City, State</div>
        </div>

        <div class="info-section">
            <div class="section-title">💬 About Me</div>
            <div class="bio-text" id="girlBio">
                Loading biography...
            </div>
        </div>

        <div class="info-section">
            <div class="section-title">🕐 Chat Schedule</div>
            <div class="schedule-slots" id="scheduleSlots">
                <!-- Schedule slots will be filled by JavaScript -->
            </div>
        </div>

        <div class="purchase-section">
            <div class="price-tag">$15 for 5-Minute Private Chat</div>
            <button class="purchase-btn" id="purchaseBtn" onclick="purchaseChat()" disabled>
                Purchase Private Chat
            </button>
            <div class="queue-info" id="queueInfo">
                Purchase available only during scheduled hours
            </div>
        </div>
    </div>

    <a href="shoot-your-shot.html" class="back-btn">← Back to Girls</a>

    <script>
        // Girl data
        const girls = {
            'sarah': {
                name: 'Sarah, 24',
                avatar: '🔥',
                location: '📍 Los Angeles, CA',
                bio: 'Adventure seeker and coffee lover! I\'m a college student studying psychology who enjoys hiking, trying new restaurants, and deep conversations. Looking for someone genuine and spontaneous!',
                schedule: ['19:00-21:00'], // 7PM-9PM
                timezone: 'PST'
            },
            'maya': {
                name: 'Maya, 22', 
                avatar: '💫',
                location: '📍 New York, NY',
                bio: 'Creative soul and foodie! I work in marketing and love exploring the city, photography, and trying new recipes. Let\'s chat about our favorite hidden spots!',
                schedule: ['16:00-18:00'], // 4PM-6PM
                timezone: 'EST'
            },
            'chloe': {
                name: 'Chloe, 25',
                avatar: '🌟',
                location: '📍 Miami, FL',
                bio: 'Beach lover and artist! I\'m a freelance graphic designer who enjoys painting, yoga, and sunset walks. Looking for meaningful connections and good vibes!',
                schedule: ['20:00-22:00'], // 8PM-10PM
                timezone: 'EST'
            },
            'jessica': {
                name: 'Jessica, 23',
                avatar: '✨',
                location: '📍 Chicago, IL',
                bio: 'Bookworm and travel enthusiast! I work in tech and love reading, planning my next trip, and coffee shop hopping. Let\'s share stories and adventures!',
                schedule: ['14:00-16:00'], // 2PM-4PM
                timezone: 'CST'
            }
        };

        // Get which girl from URL
        const urlParams = new URLSearchParams(window.location.search);
        const girlId = urlParams.get('girl') || 'sarah';
        const girl = girls[girlId];

        // Update page with girl info
        document.getElementById('pageTitle').textContent = `MEET ${girl.name.split(',')[0].toUpperCase()}`;
        document.getElementById('girlAvatar').textContent = girl.avatar;
        document.getElementById('girlName').textContent = girl.name;
        document.getElementById('girlLocation').textContent = girl.location;
        document.getElementById('girlBio').textContent = girl.bio;

        // Create schedule slots
        const scheduleContainer = document.getElementById('scheduleSlots');
        girl.schedule.forEach(slot => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'time-slot';
            slotDiv.textContent = slot;
            scheduleContainer.appendChild(slotDiv);
        });

        // Check if it's currently scheduled time
        function checkSchedule() {
            const now = new Date();
            const currentTime = now.getHours().toString().padStart(2, '0') + ':' + 
                              now.getMinutes().toString().padStart(2, '0');
            
            let isActive = false;
            girl.schedule.forEach(slot => {
                const [start, end] = slot.split('-');
                if (currentTime >= start && currentTime <= end) {
                    isActive = true;
                }
            });

            const purchaseBtn = document.getElementById('purchaseBtn');
            const queueInfo = document.getElementById('queueInfo');
            
            if (isActive) {
                purchaseBtn.disabled = false;
                queueInfo.textContent = 'Chat is LIVE! Join the queue now.';
                // Add active class to current time slot
                document.querySelectorAll('.time-slot').forEach(slot => {
                    if (slot.textContent.includes(currentTime.substring(0,2))) {
                        slot.classList.add('active');
                    }
                });
            } else {
                purchaseBtn.disabled = true;
                queueInfo.textContent = 'Purchase available only during scheduled hours';
            }
        }

        // Check schedule every minute
        checkSchedule();
        setInterval(checkSchedule, 60000);

        // Replace the existing purchaseChat function with:
function purchaseChat() {
    const urlParams = new URLSearchParams(window.location.search);
    const girlId = urlParams.get('girl');
    
    // Redirect to payment page
    window.location.href = `payments.html?girl=${girlId}`;
}
    </script>
</body>
</html>

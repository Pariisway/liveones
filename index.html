  <style>
    /* Hybrid Neon + Clean Grid theme (Option C) */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root{
      --bg:#0b0014;
      --panel:#12001f;
      --neon1:#ff00e6;
      --neon2:#00eaff;
      --text:#f2dfff;
      --muted:#bfa8ff;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Press Start 2P',monospace;background:radial-gradient(circle at 50% 20%, #2a0040, var(--bg) 70%);color:var(--text)}
    .site-header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:4px solid rgba(255,255,255,0.02)}
    .logo{font-size:18px;color:var(--neon1);text-shadow:0 0 8px var(--neon1)}
    .subtitle{font-size:10px;color:var(--muted);margin-top:6px}
    .header-right{text-align:right;font-size:12px;color:#b5b0d9}
    .main-wrap{max-width:1400px;margin:28px auto;padding:0 20px}

    /* Panels */
    .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:18px;border:3px solid var(--neon1);box-shadow:0 0 40px rgba(2,6,23,0.6);margin-bottom:20px}
    .voice-panel .lead, .arcade-panel .lead{color:var(--muted);font-size:12px;margin-top:6px}

    /* Controls */
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{background:var(--panel);border:2px solid var(--neon2);color:var(--text);padding:10px 12px;border-radius:8px;cursor:pointer;box-shadow:0 0 8px var(--neon2)}
    .btn.primary{background:linear-gradient(90deg,var(--neon1),var(--neon2));color:#001018;border:0;box-shadow:0 0 10px var(--neon1),0 0 12px var(--neon2)}
    .status{margin-top:12px;color:var(--muted);font-size:13px}
    .people{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .person{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;min-width:140px}
    .person.muted{opacity:0.5}

    /* Ads */
    .ad-slot{margin:12px 0;padding:12px;border-radius:8px;background:linear-gradient(90deg, rgba(0,0,0,0.25), rgba(255,255,255,0.01));text-align:center}

    /* Arcade header */
    .arcade-title{
      color:var(--neon2);
      text-shadow:0 0 12px var(--neon2);
      font-size:20px;
      margin:6px 0 14px 0;
    }

    /* Games grid (4-col) */
    .games-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:18px;
      width:100%;
    }

    .game-card {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 3px solid var(--neon2);
      border-radius: 10px;
      box-shadow: 0 0 18px var(--neon2);
      background: #000;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 25px var(--neon2);
    }

    .game-thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.7;
    }

    .game-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px;
      font-size: 10px;
      text-align: center;
      color: white;
    }

    /* Popup Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      position: relative;
      width: 90%;
      height: 90%;
      background: var(--panel);
      border-radius: 12px;
      border: 3px solid var(--neon1);
      box-shadow: 0 0 40px var(--neon1);
      overflow: hidden;
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--neon1);
      color: var(--text);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      z-index: 1001;
      font-weight: bold;
    }

    .modal-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Responsive */
    @media (max-width:1100px){
      .games-grid{grid-template-columns: repeat(2, 1fr);}
    }
    @media (max-width:700px){
      .games-grid{grid-template-columns: 1fr;}
      .game-card{aspect-ratio: 4/3;}
      .modal-content {
        width: 95%;
        height: 95%;
      }
    }

    /* Footer */
    .site-footer{margin:18px auto;text-align:center;color:var(--muted);font-size:12px}
  </style>
</head>

    <!-- Game Popup Modal -->

  <script>
    // app.js — Agora voice chat (test mode, tokenless)
    // Replace APP_ID if you later change projects
    const APP_ID = "966c8e41da614722a88d4372c3d95dba";
    const CHANNEL = "The Live Ones";
    const TOKEN = null; // test mode

    let client = null;
    let localAudioTrack = null;

    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const muteBtn = document.getElementById("muteBtn");
    const statusEl = document.getElementById("status");
    const peopleEl = document.getElementById("people");
    const userCountEl = document.getElementById("userCount");

    function setStatus(text){
      if(statusEl) statusEl.textContent = "Status: " + text;
    }

    async function initClient(){
      client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });

      client.on("user-published", async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === "audio") {
          user.audioTrack.play();
        }
        renderUsers();
      });

      client.on("user-unpublished", (user) => {
        renderUsers();
      });

      client.on("user-left", (user) => {
        renderUsers();
      });
    }

    async function joinChannel(){
      if(!client) await initClient();
      try {
        setStatus("Requesting microphone...");
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        setStatus("Joining channel...");
        await client.join(APP_ID, CHANNEL, TOKEN, null);
        await client.publish([localAudioTrack]);
        setStatus("Connected — you are live");
        joinBtn.disabled = true;
        leaveBtn.disabled = false;
        muteBtn.disabled = false;
        renderUsers();
      } catch (err) {
        console.error("Agora join error:", err);
        setStatus("Error joining channel (see console)");
        joinBtn.disabled = false;
      }
    }

    async function leaveChannel(){
      try {
        if(localAudioTrack){
          await client.unpublish([localAudioTrack]);
          localAudioTrack.close();
          localAudioTrack = null;
        }
        await client.leave();
      } catch(e){
        console.warn("Leave error", e);
      }
      setStatus("Not connected");
      peopleEl.innerHTML = "";
      joinBtn.disabled = false;
      leaveBtn.disabled = true;
      muteBtn.disabled = true;
      renderUsers();
    }

    function toggleMute(){
      if(!localAudioTrack) return;
      const enabled = localAudioTrack.enabled;
      localAudioTrack.setEnabled(!enabled);
      muteBtn.textContent = enabled ? "Unmute" : "Mute";
      setStatus(enabled ? "You are muted" : "You are live");
    }

    function renderUsers(){
      if(!client) return;
      const remote = client.remoteUsers ? Object.values(client.remoteUsers) : [];
      peopleEl.innerHTML = "";
      // local user first
      if(localAudioTrack){
        const d = document.createElement("div");
        d.className = "person";
        d.innerHTML = "<div style='font-weight:700'>You</div><div style='font-size:12px;color:var(--muted)'>Local (publishing)</div>";
        peopleEl.appendChild(d);
      }
      // remote users
      remote.forEach(u => {
        const div = document.createElement("div");
        div.className = "person";
        div.id = "u-" + u.uid;
        div.innerHTML = "<div style='font-weight:700'>User " + u.uid + "</div><div style='font-size:12px;color:var(--muted)'>Remote</div>";
        peopleEl.appendChild(div);
      });
      userCountEl.textContent = "Users: " + (remote.length + (localAudioTrack ? 1 : 0));
    }

    // Game popup functionality
    const gameModal = document.getElementById('gameModal');
    const gameIframe = document.getElementById('gameIframe');
    const modalClose = document.getElementById('modalClose');
    const gameCards = document.querySelectorAll('.game-card');

    // Open game in popup
    gameCards.forEach(card => {
      card.addEventListener('click', () => {
        const gameUrl = card.getAttribute('data-game');
        const gameTitle = card.getAttribute('data-title');
        
        gameIframe.src = gameUrl;
        gameModal.style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Prevent scrolling
      });
    });

    // Close popup
    modalClose.addEventListener('click', () => {
      gameModal.style.display = 'none';
      gameIframe.src = ''; // Stop the game
      document.body.style.overflow = 'auto'; // Re-enable scrolling
    });

    // Close popup when clicking outside the content
    gameModal.addEventListener('click', (e) => {
      if (e.target === gameModal) {
        gameModal.style.display = 'none';
        gameIframe.src = ''; // Stop the game
        document.body.style.overflow = 'auto'; // Re-enable scrolling
      }
    });

    // Close popup with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && gameModal.style.display === 'flex') {
        gameModal.style.display = 'none';
        gameIframe.src = ''; // Stop the game
        document.body.style.overflow = 'auto'; // Re-enable scrolling
      }
    });

    // wire buttons
    joinBtn.addEventListener("click", joinChannel);
    leaveBtn.addEventListener("click", leaveChannel);
    muteBtn.addEventListener("click", toggleMute);

    // init
    initClient().catch(e => console.error(e));

    // tidy up on unload
    window.addEventListener("beforeunload", async () => {
      try { await leaveChannel(); } catch(e) {}
    });
  </script>

    /* Hybrid Neon + Clean Grid theme (Option C) */

    :root{
      --bg:#0b0014;
      --panel:#12001f;
      --neon1:#ff00e6;
      --neon2:#00eaff;
      --text:#f2dfff;
      --muted:#bfa8ff;

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:'Press Start 2P',monospace;background:radial-gradient(circle at 50% 20%, #2a0040, var(--bg) 70%);color:var(--text)}

    .logo{font-size:18px;color:var(--neon1);text-shadow:0 0 8px var(--neon1)}
    .subtitle{font-size:10px;color:var(--muted);margin-top:6px}
    .header-right{text-align:right;font-size:12px;color:#b5b0d9}

    /* Panels */
    .panel{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:12px;padding:18px;border:3px solid var(--neon1);box-shadow:0 0 40px rgba(2,6,23,0.6);margin-bottom:20px}
    .voice-panel .lead, .arcade-panel .lead{color:var(--muted);font-size:12px;margin-top:6px}

    /* Controls */
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{background:var(--panel);border:2px solid var(--neon2);color:var(--text);padding:10px 12px;border-radius:8px;cursor:pointer;box-shadow:0 0 8px var(--neon2)}
    .btn.primary{background:linear-gradient(90deg,var(--neon1),var(--neon2));color:#001018;border:0;box-shadow:0 0 10px var(--neon1),0 0 12px var(--neon2)}
    .status{margin-top:12px;color:var(--muted);font-size:13px}
    .people{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .person{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;min-width:140px;display:flex;justify-content:space-between;align-items:center}
    .person.muted{opacity:0.5}
    .person .name { font-weight:700; }
    .person .meta { font-size:12px;color:var(--muted) }

    /* Ads */
    .ad-slot{margin:12px 0;padding:12px;border-radius:8px;background:linear-gradient(90deg, rgba(0,0,0,0.25), rgba(255,255,255,0.01));text-align:center}

    /* Arcade header */
    .arcade-title{color:var(--neon2);text-shadow:0 0 12px var(--neon2);font-size:20px;margin:6px 0 14px 0}

    /* Games grid with thumbnails */
    .games-grid{display:grid;grid-template-columns: repeat(4, 1fr);gap:18px;width:100%}
    .game-card{position:relative;width:100%;padding-top:56.25%;border:3px solid var(--neon2);border-radius:10px;background:linear-gradient(180deg,#000,#08020b);overflow:hidden;cursor:pointer;transition:transform .18s,box-shadow .18s;display:flex;align-items:center;justify-content:center;min-height:120px}
    .game-card .content{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px}
    .game-thumbnail{width:100%;height:60%;object-fit:cover;border-radius:6px;margin-bottom:8px;background:linear-gradient(45deg, #ff00e6, #00eaff);display:flex;align-items:center;justify-content:center;font-size:24px}
    .game-icon-emoji{font-size:28px;margin-bottom:8px}
    .game-title{font-size:11px;text-align:center;color:var(--text);text-shadow:0 0 6px rgba(0,0,0,0.6);padding:0 6px;line-height:1.3}
    .game-card:hover{transform:translateY(-4px);box-shadow:0 0 30px var(--neon2)}

    /* Popup Modal */
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.9);z-index:1000;justify-content:center;align-items:center}
    .modal-content{position:relative;width:90%;height:90%;background:var(--panel);border-radius:12px;border:3px solid var(--neon1);box-shadow:0 0 40px var(--neon1);overflow:hidden}
    .modal-close{position:absolute;top:10px;right:10px;background:var(--neon1);color:var(--text);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;z-index:1001;font-weight:bold}
    .modal-iframe{width:100%;height:100%;border:none}

    /* Username modal */
    .username-modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);z-index:2000}
    .username-box{background:var(--panel);padding:20px;border-radius:12px;border:3px solid var(--neon2);width:320px;text-align:center}
    .username-box input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text)}

    /* Chat rooms */
    .rooms{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 18px 0}
    .room-btn{background:transparent;border:2px solid rgba(255,255,255,0.03);color:var(--text);padding:8px 10px;border-radius:8px;cursor:pointer}
    .room-btn.active{border-color:var(--neon1);box-shadow:0 0 12px var(--neon1)}

    /* Notification */
    .notif{position:fixed;top:18px;right:18px;background:rgba(0,0,0,0.8);color:var(--text);padding:10px 14px;border-radius:10px;border:2px solid var(--neon1);box-shadow:0 0 16px var(--neon1);z-index:3000}

    /* Vote modal */
    .vote-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:4000;display:flex;align-items:center;justify-content:center}
    .vote-box{background:var(--panel);padding:18px;border-radius:10px;border:2px solid var(--neon2);width:420px;text-align:center}
    .vote-buttons{display:flex;gap:12px;justify-content:center;margin-top:12px}

    /* per-user menu */
    .user-menu{display:flex;gap:6px;align-items:center}
    .kick-btn{background:var(--neon1);border:0;padding:6px 8px;border-radius:6px;color:#001018;cursor:pointer}
    .change-name{background:var(--neon2);border:0;padding:6px 8px;border-radius:6px;color:#001018;cursor:pointer}

    /* Responsive */
    @media (max-width:1100px){.games-grid{grid-template-columns: repeat(2, 1fr);}}
    @media (max-width:700px){.games-grid{grid-template-columns: 1fr}.modal-content{width:96%;height:92%}}

    .site-footer{margin:18px auto;text-align:center;color:var(--muted);font-size:12px}

    // Populate the grid with emoji thumbnails
    function populateGames(){
      gamesGrid.innerHTML = '';
      GAME_IFRAMES.forEach(g=>{
        const card = document.createElement('div');
        card.className = 'game-card';
        card.dataset.game = g.url;
        card.dataset.title = g.title;

        const emoji = getGameEmoji(g.title);
        
        card.innerHTML = `
          <div class="content">
            <div class="game-thumbnail">${emoji}</div>
            <div class="game-title">${escapeHtml(g.title)}</div>
          </div>
        `;
        card.addEventListener('click', ()=>openGame(g.url, g.title));
        gamesGrid.appendChild(card);
      });
    }
    populateGames();

    // open game modal
    modalClose.addEventListener('click', closeGame);
    function openGame(url, title){
      gameIframe.src = url;
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      showNotification(`<strong>${escapeHtml(title)}</strong> loaded`);
    }
    function closeGame(){
      modal.style.display = 'none';
      gameIframe.src = '';
      document.body.style.overflow = 'auto';

          <input id="usernameInput" placeholder="Your name..." maxlength="24" />
          <div style="margin-top:12px">
            <button class="btn primary" id="saveName">Enter</button>
            <button class="btn" id="changeLater" style="margin-left:8px">Cancel</button>
          </div>
        </div>`;
      document.body.appendChild(m);
      document.getElementById('saveName').addEventListener('click', ()=>{
        const v = document.getElementById('usernameInput').value.trim();
        if(!v) return alert('Please enter a name');
        localStorage.setItem('tl_username', v);
        USERNAME = v;
        m.remove();
        initializeRTM();
      });
      document.getElementById('changeLater').addEventListener('click', ()=>{ m.remove(); initializeRTM(); });
    }

    // allow name change later
    function promptChangeName(){
      const newName = prompt('Change your display name (max 24 chars):', USERNAME || '');
      if(newName && newName.trim()){
        const v = newName.trim().slice(0,24);
        localStorage.setItem('tl_username', v);
        USERNAME = v;
        showNotification('Name changed to ' + escapeHtml(USERNAME));
        // announce update
        if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'profile', uid:UID, name:USERNAME})});
        renderMembers();
      }
    }

    // initialize on load
    if(!USERNAME) showUsernameModal(); else initializeRTM();

    // RTM init & channel join - FIXED
    async function initializeRTM(){
      // Check if AgoraRTM is available
      if (typeof AgoraRTM === 'undefined') {
        console.error('AgoraRTM not loaded. Check script URL.');
        showNotification('RTM failed to load. Check console.');
        return;
      }
      
      UID = 'u' + Date.now().toString(36) + Math.floor(Math.random()*1000).toString(36);
      try{
        rtmClient = AgoraRTM.createInstance(APP_ID);
        await rtmClient.login({uid: UID});
        
        rtmClient.on('MessageFromPeer', ({text}, peerId)=>{ 
          console.log('Peer message', peerId, text); 
        });

        // join initial room
        await joinRTMChannel(CURRENT_ROOM);
      }catch(err){
        console.error('RTM init error', err);
        showNotification('RTM failed — check console');
      }
    }

    async function joinRTMChannel(roomName){
      try{
        if(rtmChannel){
          try{ await rtmChannel.leave(); }catch(e){}
        }
        rtmChannel = rtmClient.createChannel(roomName);
        rtmChannel.on('ChannelMessage', handleChannelMessage);
        rtmChannel.on('MemberJoined', (memberId)=> {
          rtmChannel.sendMessage({text: JSON.stringify({type:'request_profile'})});
        });
        rtmChannel.on('MemberLeft', (memberId)=> {
          members.delete(memberId);
          renderMembers();
        });
        await rtmChannel.join();
        await rtmChannel.sendMessage({text: JSON.stringify({type:'join', uid:UID, name:USERNAME})});
        await rtmChannel.sendMessage({text: JSON.stringify({type:'request_profiles'})});
      }catch(err){ console.error('joinRTMChannel', err); }
    }

    // handle incoming RTM messages
    async function handleChannelMessage(msg, memberId){
      let data = null;
      try{ data = JSON.parse(msg.text); } catch(e){ return; }

      switch(data.type){
        case 'join':
          members.set(data.uid, {name:data.name});
          renderMembers();
          showNotification(`<strong>${escapeHtml(data.name)}</strong> joined ${CURRENT_ROOM}`);
          break;

        case 'profile':
          members.set(data.uid, {name:data.name});
          renderMembers();
          break;

        case 'request_profiles':
          if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'profile', uid:UID, name:USERNAME})});
          break;

        case 'request_profile':
          if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'profile', uid:UID, name:USERNAME})});
          break;

        case 'start_vote':
          handleStartVote(data);
          break;

        case 'vote_session':
          if(data.target && data.expires){
            createVoteSession(data.target, data.expires, false);
          }
          break;

        case 'vote':
          handleIncomingVote(data);
          break;

        case 'kick':
          if(data.target === UID){
            showNotification('You were kicked from this room');
            await leaveChannel();
            kickedUntil.set(UID, Date.now() + KICK_DURATION_MS);
          } else {
            showNotification(`${escapeHtml(members.get(data.target)?.name || 'User')} was kicked`);
            members.delete(data.target);
            renderMembers();
          }
          break;

        default:
          break;
      }
    }

    /*************************************************************************
     * Rest of your existing functions (vote system, RTC voice, etc.)
     * These remain the same as in your original code
     *************************************************************************/
    
    // [Include all your existing functions for voting, RTC voice, etc. here]
    // They should work the same as before

    function handleStartVote(data){
      const {target, starter} = data;
      if(!voteStarters[target]) voteStarters[target] = new Set();
      voteStarters[target].add(starter);

      renderMembers();

      const startersCount = voteStarters[target].size;
      showNotification(`${startersCount} / ${VOTE_STARTERS_REQUIRED} started a vote to kick ${escapeHtml(members.get(target)?.name || 'User')}`);

      if(startersCount >= VOTE_STARTERS_REQUIRED && (!voteSessions[target] || voteSessions[target].expired)){
        const expires = Date.now() + VOTE_DURATION_MS;
        if(rtmChannel) {
          rtmChannel.sendMessage({text: JSON.stringify({type:'vote_session', target, expires})});
        }
        createVoteSession(target, expires, true);
      }
    }

    function createVoteSession(target, expires, local){
      if(voteSessions[target] && voteSessions[target].timerId){
        clearInterval(voteSessions[target].timerId);
      }

      voteSessions[target] = { yes: new Set(), no: new Set(), expires, timerId: null, expired:false };
      openVoteModal(target);

      voteSessions[target].timerId = setInterval(()=>{
        const remaining = voteSessions[target].expires - Date.now();
        if(remaining <= 0){
          clearInterval(voteSessions[target].timerId);
          voteSessions[target].expired = true;
          finalizeVoteSession(target);
        } else {
          voteTimer.textContent = `Time left: ${Math.ceil(remaining/1000)}s`;
        }
      }, 300);
    }

    function openVoteModal(target){
      voteQuestion.innerHTML = `Vote to kick <strong>${escapeHtml(members.get(target)?.name || 'User')}</strong>?`;
      voteModal.style.display = 'flex';
      voteYes.onclick = ()=>{ sendVote(target, true); };
      voteNo.onclick = ()=>{ sendVote(target, false); };
    }

    async function sendVote(target, choice){
      if(rtmChannel){
        rtmChannel.sendMessage({text: JSON.stringify({type:'vote', target, voter:UID, choice})});
      }
      voteModal.style.display = 'none';
      showNotification('Vote submitted');
    }

    function handleIncomingVote(data){
      const {target, voter, choice} = data;
      if(!voteSessions[target]) return;
      if(choice) voteSessions[target].yes.add(voter); else voteSessions[target].no.add(voter);
    }

    function finalizeVoteSession(target){
      const sess = voteSessions[target];
      if(!sess) return;
      const yesCount = sess.yes.size;
      const noCount = sess.no.size;
      const activeCount = Math.max(1, members.size + (localAudioTrack ? 1 : 0));
      const needed = Math.ceil(activeCount * VOTE_YES_RATIO);
      if(yesCount >= needed){
        if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'kick', target})});
        kickedUntil.set(target, Date.now() + KICK_DURATION_MS);
      } else {
        showNotification(`Vote failed — ${yesCount}/${needed} yes`);
      }
      delete voteStarters[target];
      delete voteSessions[target];
    }

    function renderMembers(){
      peopleEl.innerHTML = '';
      const localDiv = document.createElement('div'); localDiv.className='person';
      localDiv.innerHTML = `<div><div class="name">${escapeHtml(USERNAME || 'You')}</div><div class="meta">Local</div></div>
                            <div style="display:flex;gap:8px;align-items:center">
                              <button class="change-name" onclick="promptChangeName()">✎</button>
                            </div>`;
      peopleEl.appendChild(localDiv);

      members.forEach((info, uid)=>{
        if(uid === UID) return;
        const bannedUntil = kickedUntil.get(uid) || 0;
        if(Date.now() < bannedUntil) {
          const bdiv = document.createElement('div'); bdiv.className='person';
          bdiv.innerHTML = `<div><div class="name">${escapeHtml(info.name)} (kicked)</div><div class="meta">temporarily banned</div></div>`;
          peopleEl.appendChild(bdiv);
          return;
        }

        const div = document.createElement('div');
        div.className='person';
        const name = escapeHtml(info.name || ('User'+uid.slice(-4)));
        div.innerHTML = `<div><div class="name">${name}</div><div class="meta">Remote</div></div>`;

        const menu = document.createElement('div'); menu.className='user-menu';
        const startBtn = document.createElement('button'); startBtn.className='kick-btn'; startBtn.textContent = 'Start Vote';
        startBtn.addEventListener('click', ()=>{
          if(!rtmChannel) return showNotification('Not connected to RTM');
          if(uid === UID) return showNotification('You cannot start a vote against yourself');
          const banned = kickedUntil.get(uid) || 0;
          if(Date.now() < banned) return showNotification('User is currently banned');
          rtmChannel.sendMessage({text: JSON.stringify({type:'start_vote', target:uid, starter:UID})});
          handleStartVote({target:uid, starter:UID});
        });
        menu.appendChild(startBtn);
        div.appendChild(menu);
        peopleEl.appendChild(div);
      });

      userCountEl.textContent = 'Users: ' + (members.size + (localAudioTrack?1:0));
    }

    async function initRTC(){
      rtcClient = AgoraRTC.createClient({mode:'rtc', codec:'vp8'});
      rtcClient.on('user-published', async (user, mediaType)=>{
        await rtcClient.subscribe(user, mediaType);
        if(mediaType === 'audio'){
          user.audioTrack.play();
        }
        renderMembers();
      });
      rtcClient.on('user-unpublished', ()=>renderMembers());
      rtcClient.on('user-left', ()=>renderMembers());
    }

    async function joinChannel(){
      const ban = kickedUntil.get(UID) || 0;
      if(Date.now() < ban) {
        const remain = Math.ceil((ban - Date.now())/1000);
        return showNotification(`You are banned for ${remain}s`);
      }
      if(!rtmClient) await initializeRTM();
      if(!rtcClient) await initRTC();
      try{
        setStatus('Requesting mic...');
        localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
        setStatus('Joining ' + CURRENT_ROOM + '...');
        await rtcClient.join(APP_ID, CURRENT_ROOM, null, null);
        await rtcClient.publish([localAudioTrack]);
        setStatus('Connected — you are live');
        joinBtn.disabled = true; leaveBtn.disabled = false; muteBtn.disabled = false;
        renderMembers();
        if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'join', uid:UID, name:USERNAME})});
      }catch(err){
        console.error('joinChannel', err);
        setStatus('Error joining (see console)');
      }
    }

    async function leaveChannel(){
      try{
        if(localAudioTrack){ await rtcClient.unpublish([localAudioTrack]); localAudioTrack.close(); localAudioTrack = null; }
        if(rtcClient) await rtcClient.leave();
      }catch(e){ console.warn(e); }
      setStatus('Not connected'); joinBtn.disabled=false; leaveBtn.disabled=true; muteBtn.disabled=true;
      renderMembers();
    }

    function toggleMute(){
      if(!localAudioTrack) return;
      const enabled = localAudioTrack.enabled;
      localAudioTrack.setEnabled(!enabled);
      muteBtn.textContent = enabled ? 'Unmute' : 'Mute';
      setStatus(enabled ? 'You are muted' : 'You are live');
    }

    // wire buttons
    joinBtn.addEventListener('click', ()=>{
      if(!USERNAME){ showNotification('Please enter a display name first'); showUsernameModal(); return; }
      joinChannel();
    });
    leaveBtn.addEventListener('click', async ()=>{
      if(rtmChannel) rtmChannel.sendMessage({text: JSON.stringify({type:'leave', uid:UID, name:USERNAME})});
      await leaveChannel();
    });
    muteBtn.addEventListener('click', toggleMute);

    // switch rooms
    async function switchRoom(name){
      CURRENT_ROOM = name;
      document.getElementById('currentChannel').textContent = name;
      document.querySelectorAll('.room-btn').forEach(b=>b.classList.toggle('active', b.textContent===name));
      if(rtmClient) await joinRTMChannel(name);
      if(localAudioTrack){
        await leaveChannel();
        setTimeout(()=>joinChannel(), 300);
      }
    }

    // helper to allow adding games later
    window.addGame = function(title, url){
      GAME_IFRAMES.push({title, url});
      populateGames();
    };

    // clean up on unload
    window.addEventListener('beforeunload', async ()=>{ try{ await leaveChannel(); }catch(e){} });

  </script>
</body>

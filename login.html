<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - House of Whispers</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .error-message {
            color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #EF4444;
            display: none;
        }
        
        .success-message {
            color: #10B981;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #10B981;
            display: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .forgot-password {
            text-align: center;
            margin: 1rem 0;
        }
        
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">House of Whispers</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Sign In</h1>
                <p>Welcome back to House of Whispers</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn" style="width: 100%;" id="submitBtn">
                    Sign In
                </button>
            </form>
            
            <div class="forgot-password">
                <a href="forgot-password.html" style="color: #8B5CF6;">Forgot your password?</a>
            </div>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" style="color: #8B5CF6;">Sign Up</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase MUST BE LOADED FIRST -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Firebase Initialization MUST BE SECOND -->
    <script src="js/firebase-init.js"></script>
    
    <!-- Firebase Auth THIRD -->
    <script src="js/firebase-auth.js"></script>
    
    <script>
        // Form submission handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const errorElement = document.getElementById('errorMessage');
            const successElement = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // Hide previous messages
            errorElement.style.display = 'none';
            successElement.style.display = 'none';
            
            try {
                // Show loading state
                submitBtn.textContent = 'Signing In...';
                submitBtn.disabled = true;
                document.getElementById('loginForm').classList.add('loading');
                
                // Sign in using the fixed function
                await signInWithEmail(email, password);
                
                // Show success message
                showSuccess('Sign in successful! Redirecting...');
                
                // Redirect to home page after short delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Error signing in. Please try again.');
                
                // Reset button
                submitBtn.textContent = 'Sign In';
                submitBtn.disabled = false;
                document.getElementById('loginForm').classList.remove('loading');
            }
        });

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            
            // Scroll to error
            errorElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.style.display = 'block';
        }

        // Check if user is already logged in
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                if (isAuthenticated()) {
                    console.log('User already logged in, redirecting...');
                    window.location.href = 'index.html';
                }
            }, 1000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment | House of Whispers</title>
    <meta name="google-adsense-account" content="ca-pub-1184595877548269">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1184595877548269" crossorigin="anonymous"></script>
    <script src="js/page-stabilizer.js"></script>
    <script src="js/navigation-guard.js"></script>
    <script src="js/firebase-init-unified.js"></script>
</head>
<body class="page-transition">
    <div style="max-width: 500px; margin: 50px auto; padding: 20px;">
        <div class="glass-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">🎤 Ready to Connect!</h1>
                <p style="opacity: 0.8;">Your 5-minute private call is ready</p>
                <div style="font-size: 3rem; font-weight: bold; color: var(--accent); margin: 20px 0;">$15</div>
            </div>
            
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0;">
                <h3 style="margin-bottom: 15px;">What's included:</h3>
                <ul style="margin-left: 20px; opacity: 0.9;">
                    <li>5-minute private voice call</li>
                    <li>Connect instantly with your whisper</li>
                    <li>Secure, encrypted connection</li>
                    <li>Full refund if call < 2 minutes</li>
                </ul>
            </div>
            
            <!-- Email Collection -->
            <div style="margin: 30px 0;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px;">Email Address *</label>
                    <input type="email" id="customer-email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div style="margin: 20px 0; padding: 15px; background: rgba(0,255,136,0.1); border-radius: 10px;">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" id="newsletter-optin" checked style="margin-right: 10px;">
                        <span>Subscribe to newsletter for updates</span>
                    </label>
                </div>
            </div>
            
            <form id="startCallForm">
                <button type="submit" class="call-btn" style="width: 100%; padding: 18px;">
                    Start 5-Minute Call - $15
                </button>
                <p style="text-align: center; margin-top: 15px; opacity: 0.7; font-size: 0.9rem;">
                    By clicking, you agree to our Terms of Service
                </p>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const whisperId = urlParams.get('whisper');
        const whisperName = urlParams.get('name');
        
        // Pre-fill email if in localStorage
        const savedEmail = localStorage.getItem('customerEmail');
        if (savedEmail) {
            document.getElementById('customer-email').value = savedEmail;
        }
        
        if (whisperName) {
            document.querySelector('.glass-card').innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2>Calling: ${decodeURIComponent(whisperName)}</h2>
                </div>
            ` + document.querySelector('.glass-card').innerHTML;
        }
        
        document.getElementById('startCallForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('customer-email').value;
            const newsletterOptIn = document.getElementById('newsletter-optin').checked;
            
            if (!email.includes('@')) {
                alert('Please enter a valid email address');
                return;
            }
            
            const button = this.querySelector('button');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating call...';
            
            try {
                // Initialize Firebase
                if (typeof firebaseUtils !== 'undefined') {
                    await firebaseUtils.initialize();
                }
                
                const db = firebase.firestore();
                const callId = 'call_' + Date.now();
                
                await db.collection('calls').doc(callId).set({
                    callId: callId,
                    customerEmail: email,
                    whisperId: whisperId,
                    whisperName: decodeURIComponent(whisperName),
                    amount: 1500,
                    status: 'pending',
                    newsletterOptIn: newsletterOptIn,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Add to newsletter if opted in
                if (newsletterOptIn) {
                    await db.collection('newsletter').add({
                        email: email,
                        source: 'call_payment',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        callId: callId
                    });
                }
                
                button.innerHTML = '<i class="fas fa-check"></i> Success! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = `chat-room.html?call=${callId}&role=customer`;
                }, 1000);
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error: ' + error.message);
                button.disabled = false;
                button.innerHTML = 'Start 5-Minute Call - $15';
            }
        });
    </script>
</body>
</html>

                    <button type="submit" id="submit-button" class="btn primary" style="width: 100%; padding: 20px; font-size: 18px;">

        // Initialize payment page

            // Get dater info from URL

            whisperId = urlParams.get('girl');
            
            if (!whisperId) {
                alert('No dater selected');
                window.location.href = 'shoot-your-shot.html';
                return;
            }
            
            // Load dater info
            await loadDaterInfo(whisperId);
            
            // Setup Stripe elements
            setupStripe();
        });

        async function loadDaterInfo(whisperId) {
            try {
                const daters = await platformManager.getAllDaters();
                const dater = daters.find(d => d.id === whisperId);
                
                if (dater) {
                    document.getElementById('daterName').textContent = dater.displayName;
                    daterName = dater.displayName;
                } else {
                    alert('Dater not found');
                    window.location.href = 'shoot-your-shot.html';
                }
            } catch (error) {
                console.error('Error loading dater info:', error);
                alert('Error loading dater information');
            }
        }

        function setupStripe() {
            // Create card element
            const style = {
                base: {
                    color: '#ffffff',
                    fontFamily: '"Helvetica Neue", Helvetica, sans-serif',
                    fontSmoothing: 'antialiased',
                    fontSize: '16px',
                    '::placeholder': {
                        color: '#aab7c4'
                    }
                },
                invalid: {
                    color: '#fa755a',
                    iconColor: '#fa755a'
                }
            };

            cardElement = elements.create('card', { style: style });
            cardElement.mount('#card-element');

            // Handle real-time validation errors
            cardElement.on('change', function(event) {
                const displayError = document.getElementById('card-errors');
                if (event.error) {
                    displayError.textContent = event.error.message;
                } else {
                    displayError.textContent = '';
                }
            });

            // Handle form submission
            const form = document.getElementById('payment-form');
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                
                const submitButton = document.getElementById('submit-button');
                submitButton.disabled = true;
                submitButton.textContent = 'Processing...';
                
                try {
                    await processPayment();
                } catch (error) {
                    console.error('Payment error:', error);
                    alert('Payment failed: ' + error.message);
                    submitButton.disabled = false;
                    submitButton.textContent = '💳 PAY $15.00';
                }
            });
        }

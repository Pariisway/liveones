<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat - House of Whispers</title>
    <style>
        /* Copy the same CSS */
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent1: #ff0033;
            --accent2: #00ff99;
            --accent3: #ffcc00;
            --text: #ffffff;
            --muted: #888888;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        
        .site-header {
            text-align: center;
            padding: 25px 20px;
            border-bottom: 3px solid var(--accent1);
            background: rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }
        
        .glowing-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-align: center;
        }
        
        .title-large {
            font-size: 48px;
            color: var(--accent1);
            text-shadow: 0 0 30px var(--accent1);
            margin-bottom: 10px;
        }
        
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 3px solid var(--accent1);
            border-radius: 20px;
            padding: 30px;
        }
        
        .waiting-room, .active-chat {
            text-align: center;
        }
        
        .countdown {
            font-size: 100px;
            color: var(--accent2);
            margin: 50px 0;
            text-shadow: 0 0 30px var(--accent2);
        }
        
        .status-message {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--accent3);
        }
        
        .queue-position {
            font-size: 18px;
            color: var(--muted);
            margin-bottom: 20px;
        }
        
        .timer {
            font-size: 48px;
            color: var(--accent1);
            margin: 30px 0;
            text-shadow: 0 0 20px var(--accent1);
        }
        
        .chat-controls {
            margin-top: 30px;
        }
        
        .btn {
            background: linear-gradient(145deg, var(--accent1), #ff3366);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        
        .back-btn {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            background: linear-gradient(145deg, var(--accent2), #00cc88);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="glowing-title title-large">PRIVATE CHAT</div>
        <div class="glowing-title title-medium" id="chatTitle">WITH YOUR DATE</div>
    </header>

    <div class="chat-container">
        <!-- Waiting Room -->
        <div class="waiting-room" id="waitingRoom">
            <div class="status-message">🎯 You're in the queue!</div>
            <div class="queue-position" id="queuePosition">Position: Calculating...</div>
            <div class="countdown" id="countdown">...</div>
            <div class="status-message">Get ready! When it's your turn, you'll have 5 minutes to chat.</div>
        </div>

        <!-- Active Chat -->
        <div class="active-chat hidden" id="activeChat">
            <div class="status-message">🎉 You're LIVE with your date!</div>
            <div class="timer" id="chatTimer">05:00</div>
            <div class="status-message">Chat actively - you have 5 minutes!</div>
            
            <div class="chat-controls">
                <button class="btn" onclick="joinVoiceChat()">Join Voice Chat</button>
                <button class="btn" onclick="leaveChat()">Leave Chat Early</button>
            </div>
        </div>
    </div>

    <a href="shoot-your-shot.html" class="back-btn">← Back to Dating</a>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const girlId = urlParams.get('girl');
        const username = urlParams.get('user') || 'Guest';

        // Update title
        document.getElementById('chatTitle').textContent = `WITH ${girlId.toUpperCase()}`;

        // Simulate queue position (in real app, this would come from server)
        let queuePosition = Math.floor(Math.random() * 5) + 1;
        document.getElementById('queuePosition').textContent = `Position: ${queuePosition}`;

        // Countdown to chat start
        let countdown = 5;
        const countdownElement = document.getElementById('countdown');
        
        function updateCountdown() {
            if (queuePosition === 1 && countdown > 0) {
                countdownElement.textContent = countdown;
                countdown--;
                
                if (countdown < 0) {
                    startChat();
                }
            } else if (queuePosition > 1) {
                // Simulate moving up in queue
                setTimeout(() => {
                    queuePosition--;
                    document.getElementById('queuePosition').textContent = `Position: ${queuePosition}`;
                    countdown = 5; // Reset countdown when position changes
                }, 5000);
            }
        }

        // Start countdown
        setInterval(updateCountdown, 1000);

        function startChat() {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('activeChat').classList.remove('hidden');
            
            // Start 5-minute timer
            let timeLeft = 300; // 5 minutes in seconds
            const timerElement = document.getElementById('chatTimer');
            
            const chatTimer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(chatTimer);
                    endChat();
                }
            }, 1000);
        }

        function joinVoiceChat() {
            alert('Voice chat would start here! In a real app, this would connect to Agora.');
            // This would integrate with your existing Agora code
        }

        function leaveChat() {
            if (confirm('Are you sure you want to leave the chat early?')) {
                endChat();
            }
        }

        function endChat() {
            alert('Chat ended! Thank you for your time.');
            window.location.href = 'shoot-your-shot.html';
        }

        // Auto-start chat after 15 seconds for demo (remove in production)
        setTimeout(() => {
            if (queuePosition > 0) {
                queuePosition = 1;
                document.getElementById('queuePosition').textContent = 'Position: 1';
            }
        }, 15000);
    </script>
</body>
</html>

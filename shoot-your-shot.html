  <!-- ✅ FIXED: CORRECT SCRIPT LOADING ORDER (NO DUPLICATES) -->

  <!-- 3. Platform Manager THIRD (ONLY ONCE) -->
  <script src="js/platform-manager.js"></script>

  <script>
    // Debug function
    window.debugPlatform = async function() {
        console.log('=== DEBUG PLATFORM MANAGER ===');
        console.log('Platform Manager:', window.platformManager);
        
        const statusElement = document.getElementById('debugStatus');
        
        if (window.platformManager && typeof window.platformManager.getAllWhispers === 'function') {
            try {
                const whispers = await platformManager.getAllWhispers();
                console.log('Total Whispers:', whispers.length);
                console.log('Whispers:', whispers);
                
                statusElement.innerHTML = `
                    <strong>Platform Status:</strong> ✅ LOADED<br>
                    <strong>Total Whispers:</strong> ${whispers.length}<br>
                    <strong>Last Updated:</strong> ${new Date().toLocaleTimeString()}
                `;
                
                alert(`✅ Platform Manager Working!\nFound ${whispers.length} whispers in system.`);
                
                // Refresh the display
                loadWhispersDirectly();
            } catch (error) {
                console.error('Debug error:', error);
                statusElement.innerHTML = `
                    <strong>Platform Status:</strong> ❌ ERROR<br>
                    <strong>Error:</strong> ${error.message}
                `;
                alert('❌ Platform Manager Error: ' + error.message);
            }
        } else {
            statusElement.innerHTML = `
                <strong>Platform Status:</strong> ❌ NOT FOUND<br>
                Check if platform-manager.js is loaded
            `;
            alert('❌ Platform manager not found or not properly initialized!');
        }
    };

    // Load whispers from platform manager
    async function loadWhispersDirectly() {
        console.log('🔄 Loading whispers directly from platform manager...');
        const grid = document.getElementById('whispersGrid');
        const statusElement = document.getElementById('debugStatus');
        
        if (typeof platformManager === 'undefined' || typeof platformManager.getAllWhispers !== 'function') {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--accent1);">
                    <h3>❌ Platform System Error</h3>
                    <p>Platform manager not loaded properly. Please refresh the page.</p>
                    <button onclick="location.reload()" class="btn primary">Refresh Page</button>
                </div>
            `;
            if (statusElement) {
                statusElement.innerHTML = '<strong>Status:</strong> ❌ Platform Manager Not Found';
            }
            return;
        }
        
        try {
            const whispers = await platformManager.getAllWhispers();
            console.log('📊 Retrieved whispers:', whispers);
            
            if (statusElement) {
                statusElement.innerHTML = `
                    <strong>Platform Status:</strong> ✅ LOADED<br>
                    <strong>Total Whispers:</strong> ${whispers.length}<br>
                    <strong>Last Updated:</strong> ${new Date().toLocaleTimeString()}
                `;
            }
            
            if (whispers.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                        <div style="color: var(--muted); margin-bottom: 20px; font-size: 18px;">
                            🌟 No whispers available yet. Be the first to sign up!
                        </div>
                        <a href="whisper-signup.html" class="btn primary" style="background: var(--accent2); font-size: 16px; padding: 15px 30px;">
                            💖 Become a Whisper and Earn Money
                        </a>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = '';
            whispers.forEach(whisper => {
                const whisperCard = document.createElement('a');
                whisperCard.href = `girl-profile.html?girl=${whisper.id}`;
                whisperCard.className = 'girl-card';
                whisperCard.innerHTML = `
                    <div class="girl-image">${whisper.avatar || '👤'}</div>
                    <div class="girl-info">
                        <div class="girl-name">${whisper.displayName}</div>
                        <div class="girl-location">📍 ${whisper.location}</div>
                        <div class="girl-bio">${whisper.bio ? (whisper.bio.substring(0, 80) + (whisper.bio.length > 80 ? '...' : '')) : 'No bio provided'}</div>
                        <div class="girl-schedule">🕐 ${whisper.schedule && whisper.schedule[0] ? whisper.schedule[0] + ' ' + whisper.timezone : 'Check schedule'}</div>
                        <div class="girl-tag">5-min Chat: $15</div>
                    </div>
                `;
                grid.appendChild(whisperCard);
            });
            
        } catch (error) {
            console.error('❌ Error loading whispers:', error);
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--accent1);">
                    <h3>Error Loading Profiles</h3>
                    <p>${error.message}</p>
                    <button onclick="loadWhispersDirectly()" class="btn primary">Try Again</button>
                </div>
            `;
        }
    }
    
    // Load whispers when page loads
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing shoot-your-shot...');
        
        // Wait for platform manager to initialize
        const checkPlatform = setInterval(() => {
            if (window.platformManager && typeof window.platformManager.getAllWhispers === 'function') {
                clearInterval(checkPlatform);
                console.log('✅ Platform manager found and ready, loading whispers...');
                loadWhispersDirectly();
            }
        }, 100);
        
        // Timeout after 5 seconds
        setTimeout(() => {
            if (!window.platformManager || typeof window.platformManager.getAllWhispers !== 'function') {
                console.error('❌ Platform manager not found after 5 seconds');
                loadWhispersDirectly(); // Still try to load
            }
        }, 5000);
    });

    // Font loading
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        document.body.classList.remove('fonts-loading');
        document.body.classList.add('fonts-loaded');
      });
    }
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoot Your Shot - Find Your Whisper</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dating.css">
    <style>
        .call-button {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .call-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        
        .pricing-badge {
            background: #10B981;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="main-header">
            <h1>🎯 Shoot Your Shot</h1>
            <p>Connect with amazing whispers for 5-minute voice calls for 5-minute voice calls for 5-minute voice calls</p>
        </header>

        <div class="filters-section">
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search whispers..." class="search-input">
                <select id="categoryFilter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="dating">Dating Advice</option>
                    <option value="life">Life Coaching</option>
                    <option value="fun">Just for Fun</option>
                    <option value="professional">Professional</option>
                </select>
            </div>
        </div>

        <div class="content-section">
            <div id="loadingMessage" class="loading-message">
                <div class="spinner"></div>
                <p>Loading whispers...</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                <h3>No whispers available yet - Be the first to sign up!</h3>
                <p>The first whispers are signing up now! Join them and start earning.</p>
                <a href="become-a-whisper.html" class="btn primary">Become a Whisper</a>
            </div>

            <div id="girlsGrid" class="girls-grid">
                <!-- Whisper cards will be loaded here -->
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="js/dating-system.js"></script>
    <script>
        // Enhanced displayWhispers function with payment buttons
        function displayWhispers(whispers) {
            document.getElementById('loadingMessage').style.display = 'none';
            
            const girlsGrid = document.getElementById('girlsGrid');
            girlsGrid.innerHTML = '';

            whispers.forEach(whisper => {
                const girlCard = document.createElement('div');
                girlCard.className = 'girl-card';
                girlCard.innerHTML = `
                    <div class="girl-avatar">
                        <span style="font-size: 60px;">${whisper.avatar || '👤'}</span>
                        <div class="online-indicator online"></div>
                    </div>
                    <div class="girl-info">
                        <h3>${whisper.displayName || whisper.username}
                            <span class="pricing-badge">$15/5min</span>
                        </h3>
                        <p class="girl-location">📍 ${whisper.location || 'Location not set'}</p>
                        <p class="girl-bio">${whisper.bio || 'No bio yet'}</p>
                        <div class="girl-stats">
                            <span class="verification-badge">${whisper.verification || 'Pending'}</span>
                            <span class="rating">⭐ ${whisper.rating || '0.0'}</span>
                        </div>
                    </div>
                    <div class="button-group">
                        <button class="btn primary start-chat-btn" onclick="viewProfile('${whisper.id}')">
                            💘 View Profile
                        </button>
                        <a href="call-payment.html?whisperId=${whisper.id}" class="call-button">
                            🎙️ Call Now - $15
                        </a>
                    </div>
                `;
                girlsGrid.appendChild(girlCard);
            });

            console.log('✅ Whispers displayed with payment buttons');
        }

        function showNoWhispers() {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <h3>Error Loading Whispers</h3>
                <p>${message}</p>
                <button onclick="loadWhispersDirectly()" class="btn primary">Try Again</button>
            `;
        }

        // View profile function
        function viewProfile(whisperId) {
            // For now, redirect to payment page. Later you can create profile pages.
            window.location.href = `call-payment.html?whisperId=${whisperId}`;
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Shoot Your Shot page loaded');
            // Your existing loadWhispers function will be called from dating-system.js
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<!-- Load your Firebase config -->

<!-- Then load your platform manager -->
<script src="js/platform-manager.js"></script>
  <title>Shoot Your Shot - House of Whispers</title>
  <meta name="description" content="Private 5-minute video chats with local singles. Make your move and connect with verified singles in your area.">
  
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4QYRJLTXTT"></script>

    window.dataLayer = window.dataLayer || [];

  <!-- Google AdSense -->
  <meta name="google-adsense-account" content="ca-pub-1184595877548269">
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dating.css">
  <style>
    .debug-info {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px;
        border-radius: 5px;
        font-size: 12px;
        z-index: 1000;
    }
  </style>
</head>
<body class="fonts-loading">
  <div class="cyber-background"></div>
  <div class="grid-overlay"></div>
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <header class="site-header">
    <div class="glowing-title title-large">SHOOT YOUR SHOT</div>
    <div class="glowing-title title-medium">💖 PRIVATE CHATS WITH LOCAL SINGLES</div>
  </header>

  <main class="main-wrap">
    <!-- Debug Info -->
    <div class="debug-info">
        <button onclick="debugPlatform()" style="background: #ff4444; color: white; padding: 5px 10px; border: none; border-radius: 3px; cursor: pointer; margin-bottom: 5px;">
            🔧 Debug Platform
        </button>
        <div id="debugStatus">Loading...</div>
    </div>

    <div class="panel" style="text-align: center; margin-bottom: 20px;">
        <a href="dater-signup.html" class="btn primary" style="background: var(--accent2);">
            💖 Become a Dater and Earn Money
        </a>
    </div>

    <div class="girls-grid" id="datersGrid">
        <!-- Dynamic content will be loaded here -->
        <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--muted);">
            Loading profiles...
        </div>
    </div>

    <a href="index.html" class="back-btn">← Back to Main Site</a>
  </main>

  <footer class="site-footer">
    <div>HOUSE OF WHISPERS © 2024 • SHOOT YOUR SHOT DATING</div>
  </footer>

  <!-- Load platform manager FIRST -->
  <script src="js/platform-manager.js"></script>
  <script>
    // Debug function
    window.debugPlatform = function() {
        console.log('=== DEBUG PLATFORM MANAGER ===');
        console.log('Platform Manager:', window.platformManager);
        
        const statusElement = document.getElementById('debugStatus');
        
        if (window.platformManager) {
            const daters = platformManager.getAllDaters();
            console.log('Total Daters:', daters.length);
            console.log('Daters:', daters);
            
            statusElement.innerHTML = `
                <strong>Platform Status:</strong> ✅ LOADED<br>
                <strong>Total Daters:</strong> ${daters.length}<br>
                <strong>Last Updated:</strong> ${new Date().toLocaleTimeString()}
            `;
            
            alert(`Found ${daters.length} daters in system. Check console for details.`);
            
            // Refresh the display
            loadDatersDirectly();
        } else {
            statusElement.innerHTML = `
                <strong>Platform Status:</strong> ❌ NOT FOUND<br>
                Check if platform-manager.js is loaded
            `;
            alert('Platform manager not found! Check if platform-manager.js is loaded.');
        }
    };

    // FIXED: Make this function async
async function loadDatersDirectly() {
    console.log('🔄 Loading daters directly from platform manager...');
    const grid = document.getElementById('datersGrid');
    const statusElement = document.getElementById('debugStatus');
    
    if (typeof platformManager === 'undefined') {
        grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--accent1);">
                <h3>❌ Platform System Error</h3>
                <p>Platform manager not loaded. Please refresh the page.</p>
                <button onclick="location.reload()" class="btn primary">Refresh Page</button>
            </div>
        `;
        if (statusElement) {
            statusElement.innerHTML = '<strong>Status:</strong> ❌ Platform Manager Not Found';
        }
        return;
    }
    
    try {
        // FIXED: Wait for the Promise to resolve
        const daters = await platformManager.getAllDaters();
        console.log('📊 Retrieved daters:', daters);
        
        if (statusElement) {
            statusElement.innerHTML = `
                <strong>Platform Status:</strong> ✅ LOADED<br>
                <strong>Total Daters:</strong> ${daters.length}<br>
                <strong>Last Updated:</strong> ${new Date().toLocaleTimeString()}
            `;
        }
        
        if (daters.length === 0) {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px;">
                    <div style="color: var(--muted); margin-bottom: 20px; font-size: 18px;">
                        🌟 No daters available yet. Be the first to sign up!
                    </div>
                    <a href="dater-signup.html" class="btn primary" style="background: var(--accent2); font-size: 16px; padding: 15px 30px;">
                        💖 Become a Dater and Earn Money
                    </a>
                </div>
            `;
            return;
        }
        
        grid.innerHTML = '';
        daters.forEach(dater => {
            const daterCard = document.createElement('a');
            daterCard.href = `girl-profile.html?girl=${dater.id}`;
            daterCard.className = 'girl-card';
            daterCard.innerHTML = `
                <div class="girl-image">${dater.avatar || '👤'}</div>
                <div class="girl-info">
                    <div class="girl-name">${dater.displayName}</div>
                    <div class="girl-location">📍 ${dater.location}</div>
                    <div class="girl-bio">${dater.bio ? (dater.bio.substring(0, 80) + (dater.bio.length > 80 ? '...' : '')) : 'No bio provided'}</div>
                    <div class="girl-schedule">🕐 ${dater.schedule && dater.schedule[0] ? dater.schedule[0] + ' ' + dater.timezone : 'Check schedule'}</div>
                    <div class="girl-tag">5-min Chat: $15</div>
                </div>
            `;
            grid.appendChild(daterCard);
        });
        
    } catch (error) {
        console.error('❌ Error loading daters:', error);
        grid.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--accent1);">
                <h3>Error Loading Profiles</h3>
                <p>${error.message}</p>
                <button onclick="loadDatersDirectly()" class="btn primary">Try Again</button>
            </div>
        `;
    }
}
    
    // Load daters when page loads
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing shoot-your-shot...');
        
        // Wait for platform manager to initialize
        const checkPlatform = setInterval(() => {
            if (window.platformManager) {
                clearInterval(checkPlatform);
                console.log('Platform manager found, loading daters...');
                loadDatersDirectly();
            }
        }, 100);
        
        // Timeout after 3 seconds
        setTimeout(() => {
            if (!window.platformManager) {
                console.error('Platform manager not found after 3 seconds');
                loadDatersDirectly(); // Still try to load
            }
        }, 3000);
    });

    // Font loading
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        document.body.classList.remove('fonts-loading');
        document.body.classList.add('fonts-loaded');
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Whispers - House of Whispers</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .booking-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .booking-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .booking-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8B5CF6;
            text-align: center;
            margin: 1rem 0;
        }
        
        .payment-features {
            background: rgba(16, 185, 129, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #10B981;
        }
        
        .feature-list {
            list-style: none;
            padding: 0;
        }
        
        .feature-list li {
            margin: 10px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .feature-list li:before {
            content: '✅';
            position: absolute;
            left: 0;
        }
        
        .test-mode-notice {
            background: rgba(245, 158, 11, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #F59E0B;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Existing content remains the same, just updating the booking modal -->

    <!-- Booking Modal (updated for payments) -->
    <div id="bookingModal" class="booking-modal">
        <div class="booking-content">
            <div class="booking-header">
                <h2>Book Voice Call</h2>
                <p>5-minute private conversation</p>
            </div>
            
            <div id="bookingWhisperInfo" class="whisper-info">
                <!-- Whisper info will be loaded here -->
            </div>
            
            <div class="booking-price">$15.00</div>
            
            <div class="payment-features">
                <h4>What's included:</h4>
                <ul class="feature-list">
                    <li>5-minute private voice call</li>
                    <li>Direct WebRTC connection</li>
                    <li>Crystal clear audio quality</li>
                    <li>Secure payment processing</li>
                    <li>Money-back guarantee if call fails</li>
                </ul>
            </div>
            
            <div class="test-mode-notice">
                <strong>🧪 Test Mode Active</strong><br>
                Use test card: 4242 4242 4242 4242
            </div>
            
            <form id="bookingForm">
                <div class="form-group">
                    <label for="topic">What would you like to discuss?</label>
                    <textarea id="topic" name="topic" rows="3" 
                             placeholder="Briefly describe what you'd like to talk about..."
                             style="width: 100%; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3);"></textarea>
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" id="cancelBooking" class="btn secondary" style="flex: 1;">
                        Cancel
                    </button>
                    <button type="submit" class="btn" style="flex: 2;">
                        Continue to Payment
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Same scripts as before, plus Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
    <script src="js/stripe-payments.js"></script>
    
    <script>
        // Update the booking form submission to go to payment page
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const whisperId = currentBookingWhisper;
            const topic = document.getElementById('topic').value;
            
            if (!whisperId) {
                alert('No whisper selected');
                return;
            }
            
            // Close modal
            document.getElementById('bookingModal').style.display = 'none';
            
            // Redirect to payment page
            window.location.href = `payment.html?whisperId=${whisperId}&topic=${encodeURIComponent(topic)}`;
        });

        // Rest of existing JavaScript remains the same...
    </script>
</body>
</html>

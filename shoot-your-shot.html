<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoot Your Shot - House of Whispers</title>
    <link rel="stylesheet" href="https://iaiwaf.com/css/style.css">
    <link rel="stylesheet" href="https://iaiwaf.com/css/dating.css">
</head>
<body class="fonts-loading">
    <div class="cyber-background"></div>
    <div class="main-wrap">
        <header class="site-header">
            <div class="glowing-title title-large">SHOOT YOUR SHOT</div>
            <div class="glowing-title title-medium">CONNECT WITH AMAZING WHISPERS</div>
        </header>

        <div class="panel">
            <h2 class="glowing-title title-medium">💘 Available Whispers</h2>
            <p style="text-align: center; color: var(--muted); margin-bottom: 25px;">
                Private 5-minute video chats • $15 per chat • Instant connection
            </p>

            <!-- Center the "Manage My Whispers" button -->
            <div style="text-align: center; margin: 20px 0;">
                <a href="whisper-portal.html" class="btn" style="background: var(--accent2); padding: 12px 24px;">
                    📊 Manage My Whispers
                </a>
            </div>

            <div id="loadingMessage" style="text-align: center;">
                <div class="loading-spinner"></div>
                <p>Loading amazing whispers...</p>
            </div>

            <div id="girlsGrid" class="girls-grid">
                <!-- Whispers will be loaded here dynamically -->
            </div>

            <div id="errorMessage" style="display: none; text-align: center;">
                <h3>No Whispers Available</h3>
                <p>Check back soon or <a href="become-a-whisper.html">become a whisper</a> yourself!</p>
            </div>
        </div>
    </div>

    <script src="js/platform-manager.js"></script>
    <script>
        console.log('DOM loaded, initializing shoot-your-shot...');

        async function loadWhispersDirectly() {
            console.log('🔄 Loading whispers directly from platform manager...');
            
            try {
                // Wait for platform manager with better timeout handling
                await waitForPlatformManager();
                
                console.log('✅ Platform manager ready, loading whispers...');
                const whispers = await window.platformManager.getAllDaters();
                console.log('📊 Retrieved whispers:', whispers);
                
                if (!whispers || whispers.length === 0) {
                    showNoWhispers();
                    return;
                }

                displayWhispers(whispers);
                
            } catch (error) {
                console.error('❌ Error loading whispers:', error);
                showError('Failed to load whispers: ' + error.message);
            }
        }

        function waitForPlatformManager() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 30; // 15 seconds max
                
                function check() {
                    attempts++;
                    console.log(`🔄 Checking platform manager (attempt ${attempts}/${maxAttempts})...`);
                    
                    if (window.platformManager && window.platformManager.initialized && typeof window.platformManager.getAllDaters === 'function') {
                        console.log('✅ Platform manager found and ready!');
                        resolve();
                    } else if (attempts < maxAttempts) {
                        setTimeout(check, 500);
                    } else {
                        console.warn('⚠️ Platform manager not found after maximum attempts');
                        // Try to initialize it ourselves
                        if (typeof PlatformManager !== 'undefined') {
                            console.log('🔄 Creating new platform manager instance...');
                            window.platformManager = new PlatformManager();
                            setTimeout(() => resolve(), 1000);
                        } else {
                            reject(new Error('Platform manager not available'));
                        }
                    }
                }
                
                check();
            });
        }

        function displayWhispers(whispers) {
            document.getElementById('loadingMessage').style.display = 'none';
            
            const girlsGrid = document.getElementById('girlsGrid');
            girlsGrid.innerHTML = '';

            whispers.forEach(whisper => {
                const girlCard = document.createElement('div');
                girlCard.className = 'girl-card';
                girlCard.innerHTML = `
                    <div class="girl-avatar">
                        <span style="font-size: 60px;">${whisper.avatar || '👤'}</span>
                        <div class="online-indicator online"></div>
                    </div>
                    <div class="girl-info">
                        <h3>${whisper.displayName || whisper.username}</h3>
                        <p class="girl-location">📍 ${whisper.location || 'Location not set'}</p>
                        <p class="girl-bio">${whisper.bio || 'No bio yet'}</p>
                        <div class="girl-stats">
                            <span class="verification-badge">${whisper.verification || 'Pending'}</span>
                            <span class="rating">⭐ ${whisper.rating || '0.0'}</span>
                        </div>
                    </div>
                    <button class="btn primary start-chat-btn" onclick="viewProfile('${whisper.id}')">
                        💘 View Profile
                    </button>
                `;
                girlsGrid.appendChild(girlCard);
            });

            console.log('✅ Whispers displayed successfully');
        }

        function showNoWhispers() {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
        }

        function showError(message) {
            document.getElementById('loadingMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = `
                <h3>Error Loading Whispers</h3>
                <p>${message}</p>
                <button onclick="loadWhispersDirectly()" class="btn primary">Try Again</button>
            `;
        }

        function viewProfile(whisperId) {
            window.location.href = `girl-profile.html?girl=${whisperId}`;
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Starting shoot-your-shot initialization...');
            loadWhispersDirectly();
        });
    </script>
</body>
</html>

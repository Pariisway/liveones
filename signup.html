<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - House of Whispers</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        
        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .auth-header {
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: white;
        }
        
        .auth-header p {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin: 0.5rem 0;
            transition: background 0.3s;
            text-decoration: none;
            display: block;
        }
        
        .btn:hover {
            background: #7C3AED;
        }
        
        .btn-google {
            background: #4285F4;
        }
        
        .btn-google:hover {
            background: #357AE8;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }
        
        .divider span {
            background: rgba(255, 255, 255, 0.1);
            padding: 0 1rem;
            border-radius: 20px;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .auth-footer a {
            color: #D1D5DB;
            text-decoration: none;
        }
        
        .auth-footer a:hover {
            color: white;
        }
        
        .message {
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            text-align: center;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #FCA5A5;
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #86EFAC;
        }

        .domain-warning {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.5);
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            color: #FCD34D;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🎉 Join House of Whispers</h1>
            <p>Create your account to get started</p>
        </div>

        <div class="domain-warning" id="domainWarning" style="display: none;">
            <strong>Domain Not Authorized</strong>
            <p>Please add <code>iaiwaf.com</code> to Firebase Authorized Domains to enable Google Sign-In.</p>
        </div>

        <div id="message"></div>

        <form id="signupForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">Create Account</button>
        </form>

        <div class="divider">
            <span>or</span>
        </div>

        <button onclick="handleGoogleSignIn()" class="btn btn-google" id="googleBtn">
            Continue with Google
        </button>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
            <p><a href="index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="js/firebase-auth.js"></script>
    <script>
        // Show domain warning if Google auth fails
        function showDomainWarning() {
            document.getElementById('domainWarning').style.display = 'block';
        }

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message error">❌ Passwords do not match</div>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<div class="message error">❌ Password must be at least 6 characters</div>';
                return;
            }
            
            // Show loading
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            const result = await signUpWithEmail(email, password, {
                accountType: 'user',
                createdAt: new Date().toISOString()
            });
            
            if (result.success) {
                messageDiv.innerHTML = '<div class="message success">✅ Account created! Redirecting...</div>';
                // Redirect to profile setup or home
                setTimeout(() => {
                    window.location.href = 'become-a-whisper.html?newUser=true';
                }, 1500);
            } else {
                messageDiv.innerHTML = `<div class="message error">❌ ${result.error}</div>`;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        // Handle Google sign in
        async function handleGoogleSignIn() {
            const messageDiv = document.getElementById('message');
            const googleBtn = document.getElementById('googleBtn');
            
            googleBtn.disabled = true;
            googleBtn.textContent = 'Connecting...';
            
            try {
                const result = await signInWithGoogle();
                
                if (result.success) {
                    messageDiv.innerHTML = '<div class="message success">✅ Account created! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = 'become-a-whisper.html?newUser=true';
                    }, 1500);
                } else {
                    if (result.error && result.error.includes('unauthorized-domain')) {
                        showDomainWarning();
                        messageDiv.innerHTML = '<div class="message error">❌ Domain not authorized. Please add iaiwaf.com to Firebase settings.</div>';
                    } else {
                        messageDiv.innerHTML = `<div class="message error">❌ ${result.error}</div>`;
                    }
                    googleBtn.disabled = false;
                    googleBtn.textContent = 'Continue with Google';
                }
            } catch (error) {
                showDomainWarning();
                messageDiv.innerHTML = '<div class="message error">❌ Google sign-in not configured. Please add domain to Firebase.</div>';
                googleBtn.disabled = false;
                googleBtn.textContent = 'Continue with Google';
            }
        }

        // Check if there was a previous Google auth error
        if (window.location.search.includes('googleError=true')) {
            showDomainWarning();
        }
    </script>
</body>
</html>

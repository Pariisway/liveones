<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - House of Whispers</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .error-message {
            color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #EF4444;
            display: none;
        }
        
        .success-message {
            color: #10B981;
            background: rgba(16, 185, 129, 0.1);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #10B981;
            display: none;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .terms-notice {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 1rem 0;
            text-align: center;
        }
        
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        .init-status {
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
            display: none;
        }
        
        .init-status.loading {
            background: rgba(245, 158, 11, 0.2);
            border-left: 4px solid #F59E0B;
        }
        
        .init-status.success {
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10B981;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">House of Whispers</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Sign In</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join House of Whispers today</p>
            </div>
            
            <div id="initStatus" class="init-status loading">
                🔄 Initializing Firebase...
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="signupForm" style="display: none;">
                <div class="form-group">
                    <label for="displayName">Full Name</label>
                    <input type="text" id="displayName" name="displayName" required 
                           placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Create a password (min. 6 characters)"
                           minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           placeholder="Confirm your password">
                </div>
                
                <button type="submit" class="btn" style="width: 100%;" id="submitBtn">
                    Create Account
                </button>
            </form>
            
            <div class="terms-notice">
                By creating an account, you agree to our 
                <a href="#" style="color: #8B5CF6;">Terms of Service</a> and 
                <a href="#" style="color: #8B5CF6;">Privacy Policy</a>
            </div>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" style="color: #8B5CF6;">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Load Firebase SDKs FIRST -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Load our SIMPLE Firebase initialization SECOND -->
    <script src="js/firebase-simple.js"></script>
    
    <script>
        // Wait for everything to load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM loaded, checking Firebase...');
            checkFirebaseReady();
        });

        // Check if Firebase is ready
        function checkFirebaseReady() {
            const initStatus = document.getElementById('initStatus');
            const signupForm = document.getElementById('signupForm');
            
            if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                // Firebase is ready!
                initStatus.textContent = '✅ Firebase ready!';
                initStatus.className = 'init-status success';
                signupForm.style.display = 'block';
                
                // Check if user is already logged in
                setTimeout(() => {
                    if (firebaseAuth.isAuthenticated()) {
                        showSuccess('Already signed in! Redirecting...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    }
                }, 500);
                
            } else {
                // Firebase not ready yet, check again
                initStatus.textContent = '🔄 Waiting for Firebase...';
                setTimeout(checkFirebaseReady, 500);
            }
        }

        // Form submission handler
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const errorElement = document.getElementById('errorMessage');
            const successElement = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // Hide previous messages
            errorElement.style.display = 'none';
            successElement.style.display = 'none';
            
            // Basic validation
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            try {
                // Show loading state
                submitBtn.textContent = 'Creating Account...';
                submitBtn.disabled = true;
                document.getElementById('signupForm').classList.add('loading');
                
                // Use the SIMPLE auth function
                await firebaseAuth.signUp(email, password, displayName);
                
                // Show success message
                showSuccess('Account created successfully! Redirecting...');
                
                // Redirect to home page
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            } catch (error) {
                console.error('Signup error:', error);
                showError(error.message);
                
                // Reset button
                submitBtn.textContent = 'Create Account';
                submitBtn.disabled = false;
                document.getElementById('signupForm').classList.remove('loading');
            }
        });

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            errorElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.style.display = 'block';
            successElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        // Real-time password confirmation validation
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            
            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = '#EF4444';
            } else {
                this.style.borderColor = '#10B981';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Test Firestore</title>
</head>
<body>
    <h1>Testing Firestore Connection</h1>
    <button onclick="testWrite()">Test Write to Firestore</button>
    <button onclick="testRead()">Test Read from Firestore</button>
    <div id="result"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        async function testWrite() {
            try {
                await db.collection('test').doc('testDoc').set({
                    message: 'Hello Firestore!',
                    timestamp: new Date()
                });
                document.getElementById('result').innerHTML = '✅ Write successful!';
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Write failed: ' + error.message;
            }
        }
        
        async function testRead() {
            try {
                const doc = await db.collection('test').doc('testDoc').get();
                if (doc.exists) {
                    document.getElementById('result').innerHTML = '✅ Read successful: ' + JSON.stringify(doc.data());
                } else {
                    document.getElementById('result').innerHTML = '❌ No document found';
                }
            } catch (error) {
                document.getElementById('result').innerHTML = '❌ Read failed: ' + error.message;
            }
        }
    </script>
</body>
</html>

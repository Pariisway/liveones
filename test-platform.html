<!DOCTYPE html>
<html>
<head>
    <title>Platform Manager Test</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="platform-manager.js?v=test2"></script>
</head>
<body>
    <h1>Platform Manager Test</h1>
    <button onclick="testPlatformManager()">Test Platform Manager</button>
    <div id="output"></div>

    <script>
        function testPlatformManager() {
            const output = document.getElementById('output');
            output.innerHTML = 'Testing...';
            
            if (!window.platformManager) {
                output.innerHTML = '❌ platformManager not found';
                return;
            }

            // Check if methods exist
            const methods = ['getAllDaters', 'addDater', 'updateDater', 'syncWithFirebase'];
            const missingMethods = methods.filter(method => typeof platformManager[method] === 'undefined');
            
            if (missingMethods.length > 0) {
                output.innerHTML = `❌ Missing methods: ${missingMethods.join(', ')}`;
                return;
            }

            output.innerHTML = '✅ All methods available! Platform Manager is working.';
            
            // Test adding a dater
            const testDater = {
                username: 'testuser',
                displayName: 'Test User',
                email: 'test@example.com',
                location: 'Test City',
                avatar: '😊'
            };

            platformManager.addDater(testDater)
                .then(result => {
                    output.innerHTML += '<br>✅ addDater test passed!';
                    console.log('addDater result:', result);
                })
                .catch(error => {
                    output.innerHTML += `<br>❌ addDater test failed: ${error.message}`;
                    console.error('addDater error:', error);
                });
        }

        // Test when page loads
        setTimeout(() => {
            testPlatformManager();
        }, 2000);
    </script>
</body>
</html>

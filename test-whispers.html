<!DOCTYPE html>
<html>
<head>
    <title>Test Whispers</title>
    <script src="js/platform-manager.js"></script>
</head>
<body>
    <h1>Platform Manager Test</h1>
    <button onclick="testPM()">Test Platform Manager</button>
    <div id="result"></div>

    <script>
        async function testPM() {
            const result = document.getElementById('result');
            result.innerHTML = 'Testing...';
            
            try {
                await waitForPM();
                const whispers = await window.platformManager.getAllDaters();
                result.innerHTML = `
                    <h3>✅ Platform Manager Working!</h3>
                    <p>Found ${whispers.length} whispers:</p>
                    <ul>
                        ${whispers.map(w => `<li>${w.displayName} (${w.id})</li>`).join('')}
                    </ul>
                `;
            } catch (error) {
                result.innerHTML = `<h3>❌ Error: ${error.message}</h3>`;
            }
        }

        function waitForPM() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                function check() {
                    attempts++;
                    if (window.platformManager && window.platformManager.initialized) {
                        resolve();
                    } else if (attempts < 20) {
                        setTimeout(check, 500);
                    } else {
                        reject(new Error('Platform manager timeout'));
                    }
                }
                check();
            });
        }

        // Auto-test on load
        setTimeout(testPM, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - House of Whispers</title>
    <script src="https://cdn.agora.io/sdk/release/AgoraRTC_N-4.19.2.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1F2937 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .call-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .call-header {
            margin-bottom: 2rem;
        }
        
        .call-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .call-timer {
            font-size: 3rem;
            font-weight: bold;
            margin: 2rem 0;
            color: #8B5CF6;
        }
        
        .call-status {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            min-height: 30px;
        }
        
        .call-controls {
            margin: 2rem 0;
        }
        
        .call-button {
            padding: 1rem 2rem;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s;
        }
        
        .call-button:hover {
            background: #7C3AED;
            transform: scale(1.05);
        }
        
        .call-button.end-call {
            background: #EF4444;
        }
        
        .call-button.end-call:hover {
            background: #DC2626;
        }
        
        .audio-visualizer {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6B7280;
            font-size: 1.1rem;
        }
        
        .call-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .demo-notice {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #10B981;
        }
    </style>
</head>
<body>
    <div class="call-container" id="call-container">
        <div class="call-header">
            <h1>🎙️ Live Voice Call</h1>
            <p>Connected to Whisper</p>
        </div>

        <div class="demo-notice">
            <strong>Demo Mode Active</strong>
            <p>Voice call simulation - No real audio connection</p>
        </div>
        
        <div class="call-timer" id="call-timer">05:00</div>
        
        <div class="call-status" id="call-status">
            Call connected successfully!
        </div>
        
        <div class="audio-visualizer" id="audio-visualizer">
            🎵 Audio Stream Simulation
            <br>
            <small>In production, real audio would stream here</small>
        </div>
        
        <div class="call-controls">
            <button class="call-button end-call" id="end-call-btn" onclick="endDemoCall()">
                🎤 End Call
            </button>
        </div>
        
        <div class="call-info">
            <div class="info-row">
                <span>Duration:</span>
                <span>5 minutes</span>
            </div>
            <div class="info-row">
                <span>Cost:</span>
                <span>$15.00</span>
            </div>
            <div class="info-row">
                <span>Status:</span>
                <span id="call-detail-status">Connected (Demo)</span>
            </div>
        </div>
    </div>

    <script>
        // Demo voice call functionality
        let timeLeft = 300; // 5 minutes
        let callTimer;

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('call-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                endDemoCall();
            }
        }

        function startDemoCall() {
            console.log('🚀 Starting demo voice call');
            callTimer = setInterval(updateTimer, 1000);
            document.getElementById('call-status').innerHTML = 
                '<span style="color: #4ADE80;">🔊 Call Connected - Speak Now! (Demo)</span>';
        }

        function endDemoCall() {
            clearInterval(callTimer);
            document.getElementById('call-status').innerHTML = 
                '<span style="color: #6B7280;">Call Ended</span>';
            document.getElementById('call-detail-status').textContent = 'Completed';
            document.getElementById('end-call-btn').style.display = 'none';
            
            // Show call completed message
            setTimeout(() => {
                alert('Call completed! In production, earnings would be tracked and paid out after 3 days.');
                window.location.href = 'shoot-your-shot.html';
            }, 1000);
        }

        // Start call when page loads
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(startDemoCall, 1000);
        });
    </script>
</body>
</html>

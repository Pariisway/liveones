<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Call - House of Whispers</title>
    <script src="https://cdn.agora.io/sdk/release/AgoraRTC_N-4.19.2.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1F2937 0%, #111827 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        .call-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        
        .call-header {
            margin-bottom: 2rem;
        }
        
        .call-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .call-timer {
            font-size: 3rem;
            font-weight: bold;
            margin: 2rem 0;
            color: #8B5CF6;
        }
        
        .call-status {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            min-height: 30px;
        }
        
        .call-controls {
            margin: 2rem 0;
        }
        
        .call-button {
            padding: 1rem 2rem;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s;
        }
        
        .call-button:hover {
            background: #7C3AED;
            transform: scale(1.05);
        }
        
        .call-button.end-call {
            background: #EF4444;
            display: none;
        }
        
        .call-button.end-call:hover {
            background: #DC2626;
        }
        
        .audio-visualizer {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6B7280;
        }
        
        .call-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .volume-control {
            width: 100%;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="call-container" id="call-container">
        <div class="call-header">
            <h1>🎙️ Live Voice Call</h1>
            <p>Connected to Whisper</p>
        </div>
        
        <div class="call-timer" id="call-timer">05:00</div>
        
        <div class="call-status" id="call-status">
            Connecting to whisper...
        </div>
        
        <div class="audio-visualizer" id="audio-visualizer">
            <div id="remote-audio"></div>
            <span>Audio Stream</span>
        </div>
        
        <div class="call-controls">
            <button class="call-button end-call" id="end-call-btn" onclick="endAgoraCall()">
                🎤 End Call
            </button>
        </div>
        
        <div class="call-info">
            <div class="info-row">
                <span>Duration:</span>
                <span>5 minutes</span>
            </div>
            <div class="info-row">
                <span>Cost:</span>
                <span>$15.00</span>
            </div>
            <div class="info-row">
                <span>Status:</span>
                <span id="call-detail-status">Starting...</span>
            </div>
        </div>
    </div>

    <!-- Firebase Configuration -->
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>

    <script src="js/agora-voice-call.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Login | House of Whispers</title>
    <meta name="google-adsense-account" content="ca-pub-1184595877548269">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1184595877548269" crossorigin="anonymous"></script>
    <script src="js/page-stabilizer.js"></script>
    <script src="js/navigation-guard.js"></script>
    <script src="js/firebase-init-unified.js"></script>
</head>
<body class="page-transition">
    <div style="max-width: 500px; margin: 100px auto; padding: 20px;">
        <div class="glass-card">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Whisper Login</h1>
                <p style="opacity: 0.8;">Access your whisper dashboard</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px;">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px;">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="call-btn" style="width: 100%; margin-top: 20px;">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <p style="opacity: 0.8; margin-bottom: 20px;">Not a whisper yet?</p>
                <a href="whisper-signup.html" class="call-btn" style="background: rgba(255,255,255,0.1);">
                    <i class="fas fa-user-plus"></i> Apply to Become a Whisper
                </a>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" style="color: rgba(255,255,255,0.8); text-decoration: none;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = this.querySelector('button');
            
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            button.disabled = true;
            
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return firebase.firestore().collection('users').doc(userCredential.user.uid).get();
                })
                .then(doc => {
                    if (doc.exists && doc.data().userType === 'whisper') {
                        window.location.href = 'whisper-dashboard.html';
                    } else {
                        alert('This account is not registered as a whisper');
                        firebase.auth().signOut();
                        button.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                        button.disabled = false;
                    }
                })
                .catch((error) => {
                    alert('Login error: ' + error.message);
                    button.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                    button.disabled = false;
                });
        });
        
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                firebase.firestore().collection('users').doc(user.uid).get()
                    .then(doc => {
                        if (doc.exists && doc.data().userType === 'whisper') {
                            window.location.href = 'whisper-dashboard.html';
                        }
                    });
            }
        });
    </script>
</body>
</html>

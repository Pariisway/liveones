<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal - House of Whispers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .portal-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .btn {
            padding: 12px 24px;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: #7C3AED;
        }
        
        .btn.secondary {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .nav-buttons {
            text-align: center;
            margin-top: 30px;
        }
        
        .profile-info {
            margin: 20px 0;
        }
        
        .no-profile {
            background: rgba(245, 158, 11, 0.2);
            padding: 2rem;
            border-radius: 15px;
            border-left: 4px solid #F59E0B;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎪 My Whisper Portal</h1>
            <p>Manage your whisper profile and earnings</p>
        </div>
        
        <div id="profileSection" class="portal-card no-profile">
            <h2>No Profile Yet</h2>
            <p>Create your whisper profile to start earning</p>
            <a href="whisper-signup.html" class="btn">Create Whisper Profile</a>
        </div>
        
        <div class="portal-card">
            <h3>Quick Actions</h3>
            <div class="nav-buttons">
                <a href="shoot-your-shot.html" class="btn">Find Whispers</a>
                <a href="become-a-whisper.html" class="btn">Become a Whisper</a>
                <a href="index.html" class="btn secondary">Home</a>
                <button onclick="signOutUser()" class="btn secondary">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <!-- Auth System -->
    <script src="js/firebase-auth.js"></script>
    
    <script>
        // Check if user has a whisper profile
        document.addEventListener('DOMContentLoaded', function() {
            const user = firebase.auth().currentUser;
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Check for existing profile
            firebase.firestore().collection('whispers').doc(user.uid).get()
                .then(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById('profileSection').innerHTML = `
                            <h2>Welcome, ${data.displayName}!</h2>
                            <div class="profile-info">
                                <p><strong>Bio:</strong> ${data.bio}</p>
                                <p><strong>Location:</strong> ${data.location}</p>
                                <p><strong>Interests:</strong> ${data.interests}</p>
                            </div>
                            <a href="whisper-signup.html" class="btn">Edit Profile</a>
                        `;
                        document.getElementById('profileSection').classList.remove('no-profile');
                    }
                })
                .catch(error => {
                    console.error('Error checking profile:', error);
                });
        });
        
        function signOutUser() {
            firebase.auth().signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>

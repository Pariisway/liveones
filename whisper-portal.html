<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Portal - House of Whispers</title>
    <link rel="stylesheet" href="https://iaiwaf.com/css/style.css">
</head>
<body class="fonts-loading">
    <div class="cyber-background"></div>
    <div class="main-wrap">
        <header class="site-header">
            <div class="glowing-title title-large">WHISPER PORTAL</div>
            <div class="glowing-title title-medium">MANAGE YOUR WHISPER PROFILE</div>
        </header>

        <div class="panel">
            <h2 class="glowing-title title-medium">Welcome to Your Whisper Portal</h2>
            <p style="text-align: center; color: var(--muted); margin-bottom: 30px;">
                Connect with amazing people and get paid for your conversations
            </p>
            
            <div style="display: grid; gap: 15px; margin-top: 20px;">
                <a href="become-a-whisper.html" class="btn primary">➕ Create New Whisper Profile</a>
                <a href="shoot-your-shot.html" class="btn">💘 Browse Other Whispers</a>
                <button onclick="showMyProfiles()" class="btn">📊 My Whisper Profiles</button>
            </div>

            <div id="myProfiles" style="display: none; margin-top: 30px;">
                <h3>Your Whisper Profiles</h3>
                <div id="profilesList"></div>
            </div>
        </div>
    </div>

    <script src="js/platform-manager.js"></script>
    <script>
        async function showMyProfiles() {
            const profilesDiv = document.getElementById('myProfiles');
            const listDiv = document.getElementById('profilesList');
            
            if (profilesDiv.style.display === 'none') {
                try {
                    await waitForPlatformManager();
                    
                    const whispers = await window.platformManager.getAllDaters();
                    if (whispers.length > 0) {
                        listDiv.innerHTML = whispers.map(whisper => `
                            <div class="profile-item" style="border: 1px solid var(--accent1); padding: 15px; margin: 10px 0; border-radius: 8px;">
                                <strong>${whisper.displayName}</strong> (${whisper.username})<br>
                                <small>📍 ${whisper.location} | 💰 $${whisper.earnings || 0} | ⭐ ${whisper.rating || '0.0'}</small><br>
                                <div style="margin-top: 10px;">
                                    <a href="girl-profile.html?girl=${whisper.id}" class="btn small">View Profile</a>
                                    <a href="whisper-dashboard.html?whisperId=${whisper.id}" class="btn small">Dashboard</a>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        listDiv.innerHTML = '<p>No whisper profiles found. <a href="become-a-whisper.html" class="btn primary">Create one now!</a></p>';
                    }
                } catch (error) {
                    listDiv.innerHTML = '<p>Error loading profiles. Please refresh and try again.</p>';
                }
                profilesDiv.style.display = 'block';
            } else {
                profilesDiv.style.display = 'none';
            }
        }

        function waitForPlatformManager() {
            return new Promise((resolve, reject) => {
                let attempts = 0;
                const maxAttempts = 20;
                
                function check() {
                    attempts++;
                    if (window.platformManager && window.platformManager.initialized) {
                        resolve();
                    } else if (attempts < maxAttempts) {
                        setTimeout(check, 500);
                    } else {
                        reject(new Error('Platform manager failed to initialize'));
                    }
                }
                
                check();
            });
        }
    </script>
</body>
</html>

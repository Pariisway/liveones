<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portal - House of Whispers</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .profile-info {
            margin: 20px 0;
            text-align: left;
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
        }
        
        .no-profile {
            background: rgba(245, 158, 11, 0.2);
            border-left: 4px solid #F59E0B;
        }
        
        .has-profile {
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid #10B981;
        }
        
        .nav-buttons {
            text-align: center;
            margin-top: 30px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .profile-details h2 {
            margin-bottom: 10px;
        }
        
        .social-links {
            display: flex;
            gap: 15px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            transition: background 0.3s;
        }
        
        .social-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #8B5CF6;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">House of Whispers</a>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="shoot-your-shot.html">Find Whispers</a>
                <a href="become-a-whisper.html">Become a Whisper</a>
                <a href="whisper-portal.html" class="active">My Portal</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🎪 My Whisper Portal</h1>
            <p>Manage your whisper profile and earnings</p>
        </div>
        
        <div id="loadingSection" class="loading-message">
            <div class="spinner"></div>
            <p>Loading your portal...</p>
        </div>
        
        <div id="profileSection" style="display: none;">
            <!-- Profile content will be loaded here -->
        </div>
        
        <div class="card">
            <h3 style="text-align: center; margin-bottom: 20px;">Quick Actions</h3>
            <div class="nav-buttons">
                <a href="shoot-your-shot.html" class="btn">Find Whispers</a>
                <a href="become-a-whisper.html" class="btn">Become a Whisper</a>
                <a href="index.html" class="btn secondary">Home</a>
                <button onclick="signOutUser()" class="btn secondary">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged((user) => {
            const loadingSection = document.getElementById('loadingSection');
            const profileSection = document.getElementById('profileSection');
            
            if (!user) {
                console.log('❌ User not authenticated');
                loadingSection.innerHTML = `
                    <div class="error-message">
                        <p>Please sign in to access your portal</p>
                        <a href="login.html?redirect=whisper-portal.html" class="btn">Sign In</a>
                    </div>
                `;
                return;
            }

            console.log('✅ User authenticated:', user.email);
            checkUserProfile(user.uid);
        });

        async function checkUserProfile(userId) {
            try {
                console.log('🔍 Checking profile for user:', userId);
                const doc = await db.collection('whispers').doc(userId).get();
                
                const loadingSection = document.getElementById('loadingSection');
                const profileSection = document.getElementById('profileSection');
                
                loadingSection.style.display = 'none';
                profileSection.style.display = 'block';

                if (doc.exists) {
                    const data = doc.data();
                    console.log('✅ Profile found:', data.displayName);
                    
                    // Generate social media links HTML
                    let socialLinksHTML = '';
                    if (data.socialMedia) {
                        const socialIcons = {
                            instagram: '📷',
                            twitter: '🐦',
                            linkedin: '💼',
                            facebook: '👥',
                            tiktok: '🎵',
                            website: '🔗'
                        };
                        
                        Object.entries(data.socialMedia).forEach(([platform, url]) => {
                            if (url && socialIcons[platform]) {
                                socialLinksHTML += `
                                    <a href="${url}" target="_blank" class="social-link">
                                        ${socialIcons[platform]} ${platform.charAt(0).toUpperCase() + platform.slice(1)}
                                    </a>
                                `;
                            }
                        });
                    }
                    
                    profileSection.innerHTML = `
                        <div class="card has-profile">
                            <div class="profile-header">
                                ${data.photoURL ? 
                                    `<img src="${data.photoURL}" alt="${data.displayName}" class="profile-photo">` :
                                    `<div style="width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 2rem;">👤</div>`
                                }
                                <div class="profile-details">
                                    <h2>${data.displayName} 👋</h2>
                                    <p>📍 ${data.location} • ⭐ ${data.rating || '5.0'} • ${data.verification || 'Verified'} ✅</p>
                                    ${socialLinksHTML ? `<div class="social-links">${socialLinksHTML}</div>` : ''}
                                </div>
                            </div>
                            
                            <div class="profile-info">
                                <p><strong>Bio:</strong> ${data.bio}</p>
                                <p><strong>Interests:</strong> ${data.interests}</p>
                            </div>
                            
                            <div class="stats-grid">
                                <div class="stat-card">
                                    <span class="stat-number">${data.totalCalls || 0}</span>
                                    <span class="stat-label">Total Calls</span>
                                </div>
                                <div class="stat-card">
                                    <span class="stat-number">$${(data.totalEarnings || 0).toFixed(2)}</span>
                                    <span class="stat-label">Total Earnings</span>
                                </div>
                                <div class="stat-card">
                                    <span class="stat-number">${data.rating || '5.0'}</span>
                                    <span class="stat-label">Rating</span>
                                </div>
                                <div class="stat-card">
                                    <span class="stat-number">${data.verification || 'Verified'}</span>
                                    <span class="stat-label">Status</span>
                                </div>
                            </div>
                            
                            <div style="text-align: center; margin-top: 20px;">
                                <a href="whisper-signup.html" class="btn">Edit Profile</a>
                            </div>
                        </div>
                    `;
                } else {
                    console.log('❌ No profile found');
                    profileSection.innerHTML = `
                        <div class="card no-profile">
                            <h2>No Profile Yet</h2>
                            <p>Create your whisper profile to start earning money with 5-minute voice calls</p>
                            <div style="text-align: center; margin-top: 20px;">
                                <a href="whisper-signup.html" class="btn">Create Whisper Profile</a>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('❌ Error checking profile:', error);
                const loadingSection = document.getElementById('loadingSection');
                loadingSection.innerHTML = `
                    <div class="error-message">
                        <p>Error loading profile: ${error.message}</p>
                        <button onclick="window.location.reload()" class="btn">Try Again</button>
                    </div>
                `;
            }
        }

        function signOutUser() {
            auth.signOut().then(() => {
                console.log('✅ User signed out');
                window.location.href = 'index.html';
            }).catch((error) => {
                console.error('❌ Sign out error:', error);
            });
        }
    </script>
</body>
</html>

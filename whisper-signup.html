<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Whisper Profile - House of Whispers</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; min-height: 100vh; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .container { max-width: 600px; width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 3rem; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        h1 { text-align: center; margin-bottom: 2rem; font-size: 2.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; background: rgba(255, 255, 255, 0.1); color: white; font-size: 1rem; }
        input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.7); }
        .btn { width: 100%; padding: 15px; background: #8B5CF6; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn:hover { background: #7C3AED; }
        .btn.secondary { background: rgba(255, 255, 255, 0.2); }
        .btn.secondary:hover { background: rgba(255, 255, 255, 0.3); }
        .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav-buttons .btn { flex: 1; }
        .error-message { background: rgba(239, 68, 68, 0.2); padding: 1rem; border-radius: 10px; margin: 10px 0; border-left: 4px solid #EF4444; display: none; }
        .success-message { background: rgba(16, 185, 129, 0.2); padding: 1rem; border-radius: 10px; margin: 10px 0; border-left: 4px solid #10B981; display: none; }
        .loading { text-align: center; padding: 1rem; display: none; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 4px solid white; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Photo Upload Styles */
        .photo-upload-container { text-align: center; margin: 20px 0; }
        .photo-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.3); margin: 0 auto 15px; display: none; }
        .upload-btn { background: rgba(255, 255, 255, 0.2); padding: 10px 20px; border-radius: 10px; cursor: pointer; display: inline-block; margin: 10px; transition: background 0.3s; }
        .upload-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .remove-photo { background: rgba(239, 68, 68, 0.2); color: #FCA5A5; padding: 8px 15px; border-radius: 8px; cursor: pointer; display: inline-block; margin: 5px; }
        .remove-photo:hover { background: rgba(239, 68, 68, 0.3); }
        
        /* Social Media Styles */
        .social-media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
        .social-input { display: flex; align-items: center; gap: 10px; }
        .social-icon { font-size: 1.5rem; width: 30px; text-align: center; }
        
        /* Section Headers */
        .section-header { border-bottom: 2px solid rgba(255, 255, 255, 0.3); padding-bottom: 10px; margin: 30px 0 20px 0; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Create Your Whisper Profile</h1>
        
        <div id="loadingMessage" class="loading">
            <div class="spinner"></div>
            <p>Creating your profile...</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="whisperForm">
            <h3 class="section-header">📸 Profile Photo</h3>
            <div class="photo-upload-container">
                <img id="photoPreview" class="photo-preview" alt="Profile preview">
                <div>
                    <label for="photoUpload" class="upload-btn">
                        📷 Upload Photo
                    </label>
                    <input type="file" id="photoUpload" accept="image/*" style="display: none;">
                    <div id="removePhotoBtn" class="remove-photo" style="display: none;">Remove Photo</div>
                </div>
                <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">
                    Optional: Upload a clear profile photo to get more calls
                </p>
            </div>

            <h3 class="section-header">👤 Basic Information</h3>
            <div class="form-group">
                <label for="displayName">Display Name *</label>
                <input type="text" id="displayName" placeholder="Enter your display name" required>
            </div>
            
            <div class="form-group">
                <label for="bio">Bio *</label>
                <textarea id="bio" rows="4" placeholder="Tell people about yourself... What makes you a great conversation partner?" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="interests">Interests & Expertise *</label>
                <input type="text" id="interests" placeholder="e.g., Dating Coach, Career Advice, Life Coaching, Mental Health" required>
            </div>
            
            <div class="form-group">
                <label for="location">Location *</label>
                <input type="text" id="location" placeholder="Your city or country" required>
            </div>

            <h3 class="section-header">🌐 Social Media Links</h3>
            <p style="margin-bottom: 15px; opacity: 0.8;">Optional: Link your social profiles to build trust</p>
            
            <div class="social-media-grid">
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">📷</span>
                        <input type="url" id="instagram" placeholder="Instagram URL">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">🐦</span>
                        <input type="url" id="twitter" placeholder="Twitter URL">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">💼</span>
                        <input type="url" id="linkedin" placeholder="LinkedIn URL">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">👥</span>
                        <input type="url" id="facebook" placeholder="Facebook URL">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">🎵</span>
                        <input type="url" id="tiktok" placeholder="TikTok URL">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="social-input">
                        <span class="social-icon">🔗</span>
                        <input type="url" id="website" placeholder="Website URL">
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Create Profile</button>
        </form>
        
        <div class="nav-buttons">
            <a href="whisper-portal.html" class="btn secondary">Back to Portal</a>
            <a href="index.html" class="btn secondary">Home</a>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();
        
        let selectedPhotoFile = null;

        // Photo upload functionality
        document.getElementById('photoUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Validate file type
                if (!file.type.startsWith('image/')) {
                    showError('Please select an image file (JPEG, PNG, etc.)');
                    return;
                }
                
                // Validate file size (max 5MB)
                if (file.size > 5 * 1024 * 1024) {
                    showError('Please select an image smaller than 5MB');
                    return;
                }
                
                selectedPhotoFile = file;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('photoPreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('removePhotoBtn').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Remove photo functionality
        document.getElementById('removePhotoBtn').addEventListener('click', function() {
            selectedPhotoFile = null;
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('removePhotoBtn').style.display = 'none';
            document.getElementById('photoUpload').value = '';
        });

        // Upload photo to Firebase Storage
        async function uploadProfilePhoto(userId) {
            if (!selectedPhotoFile) return null;
            
            try {
                const fileExtension = selectedPhotoFile.name.split('.').pop();
                const fileName = `profile-${Date.now()}.${fileExtension}`;
                const storageRef = storage.ref(`profile-images/${userId}/${fileName}`);
                
                // Upload file
                const snapshot = await storageRef.put(selectedPhotoFile);
                
                // Get download URL
                const downloadURL = await snapshot.ref.getDownloadURL();
                
                console.log('✅ Photo uploaded:', downloadURL);
                return downloadURL;
            } catch (error) {
                console.error('❌ Photo upload error:', error);
                throw new Error('Failed to upload photo: ' + error.message);
            }
        }

        // Check authentication
        auth.onAuthStateChanged((user) => {
            if (!user) {
                showError('Please sign in to create a whisper profile. Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login.html?redirect=whisper-signup.html';
                }, 3000);
            } else {
                console.log('✅ User authenticated:', user.email);
            }
        });

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('loadingMessage').style.display = 'none';
        }

        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successMessage').style.display = 'block';
        }

        function showLoading() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loadingMessage').style.display = 'none';
        }

        document.getElementById('whisperForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                showError('Please sign in first');
                return;
            }
            
            showLoading();
            document.getElementById('submitBtn').disabled = true;
            
            try {
                let photoURL = null;
                
                // Upload photo if selected
                if (selectedPhotoFile) {
                    photoURL = await uploadProfilePhoto(user.uid);
                }
                
                // Prepare social media links
                const socialMedia = {
                    instagram: document.getElementById('instagram').value || null,
                    twitter: document.getElementById('twitter').value || null,
                    linkedin: document.getElementById('linkedin').value || null,
                    facebook: document.getElementById('facebook').value || null,
                    tiktok: document.getElementById('tiktok').value || null,
                    website: document.getElementById('website').value || null
                };
                
                // Remove empty social media fields
                Object.keys(socialMedia).forEach(key => {
                    if (socialMedia[key] === null) {
                        delete socialMedia[key];
                    }
                });

                const profileData = {
                    displayName: document.getElementById('displayName').value,
                    bio: document.getElementById('bio').value,
                    interests: document.getElementById('interests').value,
                    location: document.getElementById('location').value,
                    photoURL: photoURL,
                    socialMedia: socialMedia,
                    userId: user.uid,
                    username: user.email ? user.email.split('@')[0] : 'user',
                    email: user.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isActive: true,
                    rating: 5.0,
                    verification: 'Verified',
                    totalCalls: 0,
                    totalEarnings: 0
                };
                
                console.log('📝 Creating profile with data:', profileData);
                
                // Save to Firestore
                await db.collection('whispers').doc(user.uid).set(profileData);
                
                console.log('✅ Profile created successfully');
                
                hideLoading();
                showSuccess('Profile created successfully! Redirecting to portal...');
                
                setTimeout(() => {
                    window.location.href = 'whisper-portal.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Error creating profile:', error);
                hideLoading();
                document.getElementById('submitBtn').disabled = false;
                
                if (error.code === 'permission-denied') {
                    showError('Permission denied. Please check Firestore security rules.');
                } else {
                    showError('Error creating profile: ' + error.message);
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Whisper Profile - House of Whispers</title>
    <!-- Global Styles -->
    <link rel="stylesheet" href="css/global.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: #7C3AED;
        }
        
        .btn.secondary {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .nav-buttons .btn {
            flex: 1;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #EF4444;
            display: none;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.2);
            padding: 1rem;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 4px solid #10B981;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Create Your Whisper Profile</h1>
        
        <div id="loadingMessage" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Creating your profile...</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="whisperForm">
            <div class="form-group">
                <label for="displayName">Display Name</label>
                <input type="text" id="displayName" placeholder="Enter your display name" required>
            </div>
            
            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" rows="4" placeholder="Tell people about yourself..." required></textarea>
            </div>
            
            <div class="form-group">
                <label for="interests">Interests</label>
                <input type="text" id="interests" placeholder="e.g., Dating, Career, Life Advice" required>
            </div>
            
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" placeholder="Your city or country" required>
            </div>
            
            <div class="form-group">
                <label for="avatar">Avatar Emoji</label>
                <input type="text" id="avatar" placeholder="e.g., 👩‍💼, 💁‍♀️, 👨‍🎓" value="👤" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Create Profile</button>
        </form>
        
        <div class="nav-buttons">
            <a href="whisper-portal.html" class="btn secondary">Back to Portal</a>
            <a href="index.html" class="btn secondary">Home</a>
        </div>
    </div>

    <!-- Firebase v8 (compatibility version) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBU2tbinWSOw-N8ce6zMQ9AMKXt-5fj23g",
            authDomain: "house-of-whispers.firebaseapp.com",
            projectId: "house-of-whispers",
            storageBucket: "house-of-whispers.firebasestorage.app",
            messagingSenderId: "1063333130646",
            appId: "1:1063333130646:web:9f0d6ddc2927692aaaadb7",
            measurementId: "G-06QR5LFKJ9"
        };

        // Initialize Firebase
        console.log('🚀 Initializing Firebase...');
        
        // Check if Firebase is already initialized
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app(); // if already initialized, use that one
        }
        
        console.log('✅ Firebase initialized successfully');

        const db = firebase.firestore();
        const auth = firebase.auth();

        // Check authentication state when page loads
        auth.onAuthStateChanged((user) => {
            if (!user) {
                console.log('❌ User not authenticated, redirecting to login');
                showError('Please sign in to create a whisper profile. Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'login.html?redirect=whisper-signup.html';
                }, 3000);
            } else {
                console.log('✅ User authenticated:', user.email);
                // Check if user already has a profile
                checkExistingProfile(user.uid);
            }
        });

        async function checkExistingProfile(userId) {
            try {
                console.log('🔍 Checking for existing profile...');
                const doc = await db.collection('whispers').doc(userId).get();
                if (doc.exists) {
                    console.log('✅ Profile already exists');
                    showError('You already have a whisper profile! Redirecting to portal...');
                    setTimeout(() => {
                        window.location.href = 'whisper-portal.html';
                    }, 3000);
                } else {
                    console.log('✅ No existing profile found, ready for creation');
                }
            } catch (error) {
                console.error('❌ Error checking profile:', error);
                showError('Error checking profile: ' + error.message);
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Hide loading
            document.getElementById('loadingMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function showLoading() {
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loadingMessage').style.display = 'none';
        }

        document.getElementById('whisperForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const user = auth.currentUser;
            if (!user) {
                showError('Please sign in first');
                return;
            }
            
            // Show loading
            showLoading();
            document.getElementById('submitBtn').disabled = true;
            
            const profileData = {
                displayName: document.getElementById('displayName').value,
                bio: document.getElementById('bio').value,
                interests: document.getElementById('interests').value,
                location: document.getElementById('location').value,
                avatar: document.getElementById('avatar').value,
                userId: user.uid,
                username: user.email ? user.email.split('@')[0] : 'user',
                email: user.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                isActive: true,
                rating: 5.0,
                verification: 'Verified',
                totalCalls: 0,
                totalEarnings: 0
            };
            
            try {
                console.log('📝 Creating profile for user:', user.uid);
                console.log('📊 Profile data:', profileData);
                
                // Use set() with merge: false to create new document
                await db.collection('whispers').doc(user.uid).set(profileData);
                
                console.log('✅ Profile created successfully');
                
                hideLoading();
                showSuccess('Profile created successfully! Redirecting to portal...');
                
                setTimeout(() => {
                    window.location.href = 'whisper-portal.html';
                }, 2000);
                
            } catch (error) {
                console.error('❌ Error creating profile:', error);
                hideLoading();
                document.getElementById('submitBtn').disabled = false;
                
                if (error.code === 'permission-denied') {
                    showError('Permission denied. Please check Firestore security rules.');
                } else {
                    showError('Error creating profile: ' + error.message);
                }
            }
        });

        // Debug: Log Firebase status
        console.log('Firebase app:', firebase.app().name);
        console.log('Firebase auth:', auth);
        console.log('Firestore db:', db);
    </script>
</body>
</html>
